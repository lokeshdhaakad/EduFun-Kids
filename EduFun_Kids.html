function generateOddOneOutLevel(difficulty){
  const pool = getEmojiItemPool();
  const cats = {};
  pool.forEach(function(it){ (cats[it.cat] = cats[it.cat]||[]).push(it); });
  const catIds = Object.keys(cats).filter(function(c){ return cats[c].length>=3; });
  const mainCat = catIds[randInt(0,catIds.length-1)];
  const sameCount = difficulty==='easy'?2:(difficulty==='medium'?3:4);
  const sameItems = shuffle(cats[mainCat].slice()).slice(0, Math.min(sameCount, cats[mainCat].length));
  let oddCatCandidates = catIds.filter(function(c){ return c!==mainCat; });
  if(difficulty==='tough' && CATEGORY_CLUSTERS[mainCat]){
    const clustered = CATEGORY_CLUSTERS[mainCat].filter(function(c){ return catIds.indexOf(c)!==-1; });
    if(clustered.length) oddCatCandidates = clustered;
  }
  const oddCat = oddCatCandidates.length ? oddCatCandidates[randInt(0,oddCatCandidates.length-1)] : mainCat;
  const usedLabels = sameItems.map(function(it){return it.label;});
  let oddPoolItems = cats[oddCat].filter(function(it){ return usedLabels.indexOf(it.label)===-1; });
  if(!oddPoolItems.length) oddPoolItems = cats[oddCat];
  const oddItem = oddPoolItems[randInt(0,oddPoolItems.length-1)];
  const options = shuffle(sameItems.concat([oddItem]));
  return { options:options, oddItem:oddItem };
}

function generateBalloonPopLevel(difficulty){
  const pool = getEmojiItemPool();
  const cfg = BALLOON_CONFIG[difficulty];
  const shuffled = shuffle(pool.slice());
  const chosen = []; const usedLabels = {};
  for(let i=0;i<shuffled.length && chosen.length<cfg.count;i++){
    const it = shuffled[i];
    if(!usedLabels[it.label]){ usedLabels[it.label]=true; chosen.push(it); }
  }
  const target = chosen[randInt(0,chosen.length-1)];
  const positions = [];
  for(let i=0;i<chosen.length;i++){ positions.push(5 + Math.floor(i*(88/Math.max(1,chosen.length-1)))); }
  const shuffledPositions = shuffle(positions);
  const balloons = chosen.map(function(it,i){ return { item:it, left:shuffledPositions[i], delay:randInt(0,600) }; });
  return { balloons:shuffle(balloons), target:target, time:cfg.time };
}

const LETTER_LEVEL_COUNTS = { easy:10, medium:12, tough:10 };
const LETTER_TIME_LIMITS = { easy:16, medium:13, tough:10 };
const ALPHA_SEQ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function renderMissingLetterDifficulty(m){
  state.screen='missingLetterDiff';
  renderDifficultyPicker(m, '🔤 Missing Letter', function(diff){ startMissingLetter(m, diff); }, renderMindGamesHome,

function generateMissingLetterLevel(difficulty){
  const seqLen = 4;
  const start = randInt(0, ALPHA_SEQ.length - seqLen);
  const seq = ALPHA_SEQ.slice(start, start+seqLen).split('');
  const blankIdx = randInt(0, seqLen-1);
  const answer = seq[blankIdx];
  const display = seq.map(function(ch,i){ return i===blankIdx ? '❓' : ch; });
  const numOptions = difficulty==='easy'?3:(difficulty==='medium'?4:5);
  const optionsSet = new Set([answer]);
  while(optionsSet.size<numOptions){ optionsSet.add(ALPHA_SEQ[randInt(0, ALPHA_SEQ.length-1)]); }
  const options = shuffle(Array.from(optionsSet)).map(function(ch){ return {display:ch, value:ch}; });
  return { display:display, options:options, correctValue:answer };
}

const COLOR_SORT_LEVEL_COUNTS = { easy:10, medium:12, tough:10 };

function renderColorSortDifficulty(m){

function startColorSort(m, difficulty){
  state.mind = { game:'colorsort', difficulty:difficulty, level:1, total:COLOR_SORT_LEVEL_COUNTS[difficulty], stars:0, hintUsed:false };

}

function generateColorSortLevel(difficulty){
  const colorsMod = MODULES.find(function(mm){ return mm.id==='colors'; });
  const items = colorsMod.items;
  const numOptions = difficulty==='easy'?3:(difficulty==='medium'?4:5);
  const chosen = shuffle(items.slice()).slice(0, numOptions);
  const target = chosen[randInt(0,chosen.length-1)];
  return { options: shuffle(chosen.slice()), target: target };
}

function clearColorSortTimer(){ if(state.mind && state.mind.timerInterval){ clearInterval(state.mind.timerInterval); state.mind.timerInterval=null; } }

function nextColorSortLevel(m){
  clearColorSortTimer();
  if(state.mind.level > state.mind.total){ renderMindGameSummary(m, 'colorsort'); return; }
  state.mind.current = generateColorSortLevel(state.mind.difficulty);
  state.mind.hintUsed = false;
  renderColorSortLevel(m);
}

function renderColorSortLevel(m){

function renderMindGameSummary(m, game){

/* --- Number Games: 6 round kinds sharing one loop --- */
const NUM_GAME_COUNTS = { easy:10, medium:12, tough:12 };
const NUM_TIME_LIMITS = { easy:20, medium:16, tough:14 };
const NUM_OBJECT_SKINS = ['🍎','⭐','🍬'];
const NUM_ROUND_KINDS = {
  easy: ['missing','beforeafter','matching'],
  medium: ['missing','beforeafter','greaterless','arrange','matching'],
  tough: ['missing','beforeafter','greaterless','arrange','addition','subtraction']
};

function buildNumberOptions(correct, min, max){
  const opts = new Set([correct]);
  let guard=0;
  while(opts.size<4 && guard<200){ opts.add(randInt(min,max)); guard++; }
  return shuffle(Array.from(opts)).map(function(v){ return {display:String(v), value:v}; });
}

function genMissingRound(){
  const start = randInt(1,6);
  const seq = [start,start+1,start+2,start+3,start+4];
  const blankIdx = randInt(1,3);
  const answer = seq[blankIdx];
  const header = '<div class="num-sequence">'+seq.map(function(v,i){ return '<span class="num-seq-tile'+(i===blankIdx?' blank':'')+'">'+(i===blankIdx?'❓':v)+'</span>'; }).join('')+'</div>'
    + '<div class="num-question-text">What number is missing?</div>';
  return { headerHtml:header, options:buildNumberOptions(answer,1,10), correctValue:answer };
}

function genBeforeAfterRound(){
  const n = randInt(2,9);
  const wantAfter = Math.random()<0.5;
  const answer = wantAfter ? n+1 : n-1;
  const header = '<div class="num-big-display">'+n+'</div>'
    + '<div class="num-question-text">What number comes right '+(wantAfter?'AFTER':'BEFORE')+' '+n+'?</div>';
  return { headerHtml:header, options:buildNumberOptions(answer, Math.max(0,n-3), Math.min(11,n+3)), correctValue:answer };
}

function genGreaterLessRound(){
  let a = randInt(1,10), b = randInt(1,10);
  while(b===a) b = randInt(1,10);
  const wantGreater = Math.random()<0.5;
  const answer = wantGreater ? Math.max(a,b) : Math.min(a,b);
  const header = '<div class="num-question-text">Which number is '+(wantGreater?'GREATER':'SMALLER')+'?</div>';
  const options = shuffle([a,b]).map(function(v){ return {display:String(v), value:v}; });
  return { headerHtml:header, options:options, correctValue:answer };
}

function genArrangeRound(){
  const nums = [];
  while(nums.length<4){ const v = randInt(1,10); if(nums.indexOf(v)===-1) nums.push(v); }
  const wantSmallest = Math.random()<0.5;
  const answer = wantSmallest ? Math.min.apply(null,nums) : Math.max.apply(null,nums);
  const header = '<div class="num-question-text">Which number is the '+(wantSmallest?'SMALLEST':'LARGEST')+'?</div>';
  const options = shuffle(nums.slice()).map(function(v){ return {display:String(v), value:v}; });
  return { headerHtml:header, options:options, correctValue:answer };
}

function genAdditionRound(){
  const skin = NUM_OBJECT_SKINS[randInt(0,NUM_OBJECT_SKINS.length-1)];
  const a = randInt(1,5), b = randInt(1,4);
  const answer = a+b;
  const header = '<div class="num-equation">'+skin.repeat(a)+' <span class="num-op">+</span> '+skin.repeat(b)+' <span class="num-op">=</span> ?</div>'
    + '<div class="num-question-text">How many '+skin+' in all?</div>';
  return { headerHtml:header, options:buildNumberOptions(answer, Math.max(1,answer-3), Math.min(12,answer+3)), correctValue:answer };
}

function genSubtractionRound(){
  const skin = NUM_OBJECT_SKINS[randInt(0,NUM_OBJECT_SKINS.length-1)];
  const a = randInt(3,8), b = randInt(1,a-1);
  const answer = a-b;
  const header = '<div class="num-equation">'+skin.repeat(a-b)+'<span class="num-crossed">'+skin.repeat(b)+'</span> <span class="num-op">−</span> '+b+'</div>'
    + '<div class="num-question-text">How many '+skin+' are left?</div>';
  return { headerHtml:header, options:buildNumberOptions(answer, 0, Math.min(10,a)), correctValue:answer };
}

function genMatchingRound(){
  const skin = NUM_OBJECT_SKINS[randInt(0,NUM_OBJECT_SKINS.length-1)];
  const n = randInt(1,10);
  const header = '<div class="num-big-display">'+n+'</div><div class="num-question-text">Tap the group with '+n+' '+skin+'!</div>';
  const counts = new Set([n]);
  let guard=0;
  while(counts.size<4 && guard<200){ counts.add(randInt(1,10)); guard++; }
  const options = shuffle(Array.from(counts)).map(function(c){ return { display: skin.repeat(c), value:c }; });
  return { headerHtml:header, options:options, correctValue:n };
}

function generateNumberRound(difficulty){
  const kinds = NUM_ROUND_KINDS[difficulty];
  const kind = kinds[randInt(0,kinds.length-1)];
  if(kind==='missing') return genMissingRound();
  if(kind==='beforeafter') return genBeforeAfterRound();
  if(kind==='greaterless') return genGreaterLessRound();
  if(kind==='arrange') return genArrangeRound();
  if(kind==='addition') return genAdditionRound();
  return genSubtractionRound();
}

function renderNumberGamesDifficulty(m){
  state.screen='numGamesDiff';
  renderDifficultyPicker(m, '🎮 Number Games', function(diff){ startNumberGames(m, diff); }, renderNumbersLearnHome,
    { easy:NUM_GAME_COUNTS.easy+' rounds', medium:NUM_GAME_COUNTS.medium+' rounds', tough:NUM_GAME_COUNTS.tough+' rounds' });
}

function startNumberGames(m, difficulty){
  state.mind = { game:'numgames', difficulty:difficulty, level:1, total:NUM_GAME_COUNTS[difficulty], stars:0, hintUsed:false };
  nextNumberGameLevel(m);
}

function clearNumTimer(){ if(state.mind && state.mind.timerInterval){ clearInterval(state.mind.timerInterval); state.mind.timerInterval=null; } }

function nextNumberGameLevel(m){
  clearNumTimer();
  if(state.mind.level > state.mind.total){ renderMindGameSummary(m,'numgames'); return; }
  state.mind.current = generateNumberRound(state.mind.difficulty);
  state.mind.hintUsed = false;
  renderNumberGameLevel(m);
}

function renderNumberGameLevel(m){
  const lvl = state.mind.current;
  const timeLimit = NUM_TIME_LIMITS[state.mind.difficulty];
  state.mind.timeLeft = timeLimit;
  $('#screenTitle').textContent = 'Number Games';
  mascotSay("Let's solve this number puzzle!");
  let html = '<button class="back-link" id="backToHome">⬅ Exit</button>';
  html += '<div class="quiz-progress">Level '+state.mind.level+' of '+state.mind.total+' &nbsp;•&nbsp; ⭐ '+state.mind.stars+'</div>';
  html += '<div class="game-timer-row"><div class="game-timer-bar"><div class="game-timer-fill" id="timerFill" style="width:100%;"></div></div><span class="game-timer-text" id="timerText">'+timeLimit+'s</span></div>';
  html += lvl.headerHtml;
  html += '<div class="num-options-grid">';
  lvl.options.forEach(function(opt,i){ html += '<button class="num-option-card" data-i="'+i+'">'+opt.display+'</button>'; });
  html += '</div>';
  html += '<button class="hint-btn" id="hintBtn">💡 Hint</button>';
  $('#screen').innerHTML = html;
  $('#backToHome').addEventListener('click',function(){ clearNumTimer(); playClick(); renderNumberGamesDifficulty(m); });
  document.querySelectorAll('.num-option-card').forEach(function(btn){
    btn.addEventListener('click',function(){
      const opt = lvl.options[Number(btn.dataset.i)];
      handleNumberGameAnswer(m, opt.value===lvl.correctValue, btn);
    });
  });
  $('#hintBtn').addEventListener('click',function(){ useNumberGameHint(m); });
  startNumTimer(timeLimit, m);
}

function startNumTimer(timeLimit, m){
  const fillEl = $('#timerFill'), textEl = $('#timerText');
  state.mind.timerInterval = setInterval(function(){
    state.mind.timeLeft--;
    if(fillEl) fillEl.style.width = Math.max(0,(state.mind.timeLeft/timeLimit*100))+'%';
    if(textEl) textEl.textContent = Math.max(0,state.mind.timeLeft)+'s';
    if(state.mind.timeLeft<=0){ clearNumTimer(); handleNumberGameTimeout(m); }
  }, 1000);
}

function handleNumberGameTimeout(m){
  document.querySelectorAll('.num-option-card').forEach(function(b){ b.style.pointerEvents='none'; });
  const hintBtn=$('#hintBtn'); if(hintBtn) hintBtn.disabled=true;
  playWrong();
  mascotSay("Time's up! Let's try another!");
  const lvl = state.mind.current;
  const opts = document.querySelectorAll('.num-option-card');
  lvl.options.forEach(function(o,i){ if(o.value===lvl.correctValue && opts[i]) opts[i].classList.add('correct'); });
  setTimeout(function(){ state.mind.level++; nextNumberGameLevel(m); }, 1500);
}

function useNumberGameHint(m){
  if(state.mind.hintUsed) return;
  state.mind.hintUsed = true;
  playClick();
  const lvl = state.mind.current;
  const cards = document.querySelectorAll('.num-option-card');
  let removed=0;
  lvl.options.forEach(function(o,i){
    if(o.value!==lvl.correctValue && removed<1 && lvl.options.length>2){ cards[i].style.opacity='.3'; cards[i].style.pointerEvents='none'; removed++; }
  });
  const hintBtn=$('#hintBtn'); if(hintBtn){ hintBtn.disabled=true; hintBtn.textContent='💡 Used'; }
  mascotSay('Look closely at the numbers!');
}

function handleNumberGameAnswer(m, isCorrect, btn){
  clearNumTimer();
  document.querySelectorAll('.num-option-card').forEach(function(b){ b.style.pointerEvents='none'; });
  const hintBtn=$('#hintBtn'); if(hintBtn) hintBtn.disabled=true;
  if(isCorrect){
    btn.classList.add('correct'); playCorrect(); confettiBurst(); addStar(); state.mind.stars++;
    profile.streak++; if(profile.streak>profile.bestStreak) profile.bestStreak=profile.streak; checkBadges();
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
    setTimeout(function(){ state.mind.level++; nextNumberGameLevel(m); }, 900);
  } else {
    btn.classList.add('wrong'); playWrong(); profile.streak=0;
    mascotSay(WRONG_MSGS[randInt(0,WRONG_MSGS.length-1)]);
    const lvl = state.mind.current;
    const opts = document.querySelectorAll('.num-option-card');
    setTimeout(function(){ lvl.options.forEach(function(o,i){ if(o.value===lvl.correctValue && opts[i]) opts[i].classList.add('correct'); }); }, 500);
    setTimeout(function(){ state.mind.level++; nextNumberGameLevel(m); }, 1700);
  }
}

const STORIES = [
  // Animal Friends
  {category:'Animal Friends',emoji:'🦁',title:`The Lonely Lion`,text:`A lion roared so loudly that all the animals ran away from him. One day he stopped roaring and just smiled instead. Soon a little mouse came to play, then a bird, then a deer.`,moral:`Kindness brings friends closer than fear.`},
  {category:'Animal Friends',emoji:'🐜',title:`Tiny Ant, Big Heart`,text:`A tiny ant saw an elephant stuck deep in the mud. Everyone laughed, saying an ant was too small to help. The ant called a hundred friends, and together they pulled the elephant free.`,moral:`Even small friends can do big things together.`},
  {category:'Animal Friends',emoji:'🐢',title:`The Turtle's Race`,text:`A rabbit laughed at a slow turtle and challenged him to a race. The rabbit ran fast, then stopped to nap under a tree. The turtle walked on slowly and crossed the finish line first.`,moral:`Slow and steady wins the race.`},
  {category:'Animal Friends',emoji:'🐶',title:`Two Best Friends`,text:`A dog and a cat lived next door and always fought over toys. One rainy day they got stuck under a leaking roof together. They laughed at how silly they looked and became best friends.`,moral:`Sharing shelter can turn enemies into friends.`},
  {category:'Animal Friends',emoji:'🐘',title:`The Kind Elephant`,text:`A little goat fell into a deep hole and cried for help. A big elephant heard her and gently lowered his trunk. The goat climbed up safely and hugged the elephant's leg.`,moral:`A kind heart always finds a way to help.`},
  {category:'Animal Friends',emoji:'🦚',title:`The Peacock's Lesson`,text:`A peacock danced proudly, showing his colorful feathers to every bird. A little sparrow admired him, but he ignored her plain brown coat. Later, the sparrow's sweet song warned everyone about a storm.`,moral:`Everyone has a special gift.`},
  {category:'Animal Friends',emoji:'🦉',title:`The Sleepy Owl`,text:`An owl slept all day and stayed awake at night, watching the stars. The other birds teased him for being different. One dark night, only the owl could see well enough to guide a lost fawn home.`,moral:`Being different can be your superpower.`},
  {category:'Animal Friends',emoji:'🐿️',title:`The Squirrel's Winter Gift`,text:`A squirrel worked hard all autumn, gathering nuts for winter. A lazy rabbit played all season and had nothing to eat when snow fell. The kind squirrel happily shared her nuts with him.`,moral:`Hard work today brings comfort tomorrow.`},
  {category:'Animal Friends',emoji:'🐸',title:`The Frog Who Wanted to Fly`,text:`A little frog watched birds soar and wished he could fly too. He tried jumping with leaf-wings but landed with a splash. A wise crane told him, "You can leap higher than any bird can dive!"`,moral:`Love the special things you can already do.`},
  {category:'Animal Friends',emoji:'🦒',title:`The Giraffe Who Helped`,text:`A giraffe was the tallest animal in the jungle, but she never boasted about it. When a kite got stuck in a tall tree, she gently used her long neck to bring it down for the children.`,moral:`Use your gifts to help others.`},

  // Kindness & Sharing
  {category:'Kindness & Sharing',emoji:'🍪',title:`The Last Cookie`,text:`Mia had one cookie left and her little brother looked hungry. She broke it in half and gave him the bigger piece with a big smile. Her brother hugged her tight and called her the best sister.`,moral:`Sharing makes everything sweeter.`},
  {category:'Kindness & Sharing',emoji:'🎒',title:`The New Student`,text:`Sam sat alone on his first day at a new school, feeling scared and shy. Priya noticed him and invited him to sit with her friends at lunch. Soon Sam was laughing with five new friends.`,moral:`A little kindness can make someone's whole day.`},
  {category:'Kindness & Sharing',emoji:'☂️',title:`The Umbrella Boy`,text:`It started raining hard while Raj walked home with just one umbrella. He saw an old man getting soaked at the bus stop and walked slower, holding the umbrella over them both.`,moral:`Kindness means sharing what you have.`},
  {category:'Kindness & Sharing',emoji:'🖍️',title:`The Broken Crayon`,text:`Zoe's crayon broke in half during art class and she almost cried. Her friend Leo gave her one of his crayons without even being asked. Zoe smiled and drew the most beautiful rainbow.`,moral:`Small gifts can fix big problems.`},
  {category:'Kindness & Sharing',emoji:'🧸',title:`The Shared Toy Truck`,text:`Two sisters only had one toy truck to play with and started to argue. Instead of fighting, they decided to take turns and built a whole toy city together.`,moral:`Taking turns turns fights into fun.`},
  {category:'Kindness & Sharing',emoji:'💧',title:`The Water Bottle`,text:`On a hot sports day, Arjun's water bottle was empty and he felt very thirsty. His teammate Dev poured half of his own water into Arjun's bottle without a word.`,moral:`True friends share even in small moments.`},
  {category:'Kindness & Sharing',emoji:'🍦',title:`The Kind Queue`,text:`Everyone was pushing to be first in line for ice cream. Little Anaya let an elderly lady go ahead of her instead of rushing forward. The ice cream man gave Anaya a free scoop for it.`,moral:`Patience and kindness are often rewarded.`},
  {category:'Kindness & Sharing',emoji:'📚',title:`The Borrowed Book`,text:`Kabir forgot his storybook at home and felt sad during reading time. His classmate Meera shared her book, and they read the story together, giggling at the funny parts.`,moral:`Sharing turns loneliness into laughter.`},
  {category:'Kindness & Sharing',emoji:'🛏️',title:`The Extra Blanket`,text:`On a cold night, Aditi noticed her puppy shivering outside in the yard. She gave up her favorite blanket to keep him warm all night long.`,moral:`Comfort feels better when it is shared.`},
  {category:'Kindness & Sharing',emoji:'🌻',title:`The Little Gardener`,text:`Farhan grew beautiful sunflowers in his garden every summer. Instead of keeping them all, he gave a flower to every neighbor on the street.`,moral:`Giving makes joy grow bigger.`},

  // Brave Little Heroes
  {category:'Brave Little Heroes',emoji:'🐱',title:`The Brave Kitten`,text:`A tiny kitten was scared of the dark, but her family got locked out one stormy night. She bravely walked through the shadows to find the spare key under a flowerpot.`,moral:`Bravery means acting despite your fear.`},
  {category:'Brave Little Heroes',emoji:'🎈',title:`The Boy and the Balloon`,text:`Kabir's little sister's balloon floated toward a busy road. Even though he was scared of cars, he quickly and carefully grabbed it before she could run after it.`,moral:`Bravery can protect the people we love.`},
  {category:'Brave Little Heroes',emoji:'⛵',title:`The Storm Sailor`,text:`A small boat got caught in a sudden storm on the lake. The young sailor stayed calm, remembered his lessons, and steered safely to shore.`,moral:`Staying calm is its own kind of bravery.`},
  {category:'Brave Little Heroes',emoji:'🕯️',title:`The Dark Cave`,text:`Village children lost a ball inside a dark cave and nobody wanted to go in. Riya took a lantern and walked in bravely, humming a song to stay calm, and found the ball.`,moral:`Courage grows when you take the first step.`},
  {category:'Brave Little Heroes',emoji:'🚒',title:`The Fireman's Helper`,text:`When smoke rose from a neighbor's kitchen, seven-year-old Tomas ran to alert the grown-ups instead of freezing in fear. Thanks to his quick thinking, the fire was put out safely.`,moral:`Quick, brave action can save the day.`},
  {category:'Brave Little Heroes',emoji:'🐕',title:`The Puppy Rescue`,text:`A puppy fell into a small ditch during heavy rain. Though the water scared her, Naina reached down carefully and pulled him to safety.`,moral:`Bravery often begins with caring for others.`},
  {category:'Brave Little Heroes',emoji:'⛰️',title:`The Mountain Climb`,text:`Ken was afraid of heights, but his little cousin got stuck on a low cliff ledge. He took a deep breath, climbed up slowly, and brought her down safe and sound.`,moral:`Love can help us overcome our fears.`},
  {category:'Brave Little Heroes',emoji:'🏫',title:`The Brave New Kid`,text:`Everyone was too shy to answer the teacher's tricky question. New student Aria raised her hand even though her voice shook, and got the answer right!`,moral:`Speaking up takes real bravery.`},
  {category:'Brave Little Heroes',emoji:'⚡',title:`The Thunderstorm Night`,text:`During a scary thunderstorm, the lights went out at home. Ravi, though frightened himself, held his little brother's hand and told funny stories until the storm passed.`,moral:`Being brave for someone else makes you stronger too.`},
  {category:'Brave Little Heroes',emoji:'🪁',title:`The Lost Kite Rescue`,text:`A kite got tangled high in a thorny bush and no one wanted to reach in. Bella carefully used a stick to gently free it, using patience instead of rushing.`,moral:`Smart bravery is better than reckless bravery.`},

  // Family Time
  {category:'Family Time',emoji:'🍲',title:`Grandma's Secret Recipe`,text:`Every Sunday, Grandma let Aarav help stir her secret soup recipe. He felt so proud stirring the pot that the soup always tasted extra delicious that day.`,moral:`Love is the best ingredient in any recipe.`},
  {category:'Family Time',emoji:'🤗',title:`Papa's Big Hug`,text:`After a hard day at school, Meera felt sad and quiet. Her papa picked her up in a giant bear hug and spun her around until she giggled.`,moral:`A hug can fix a heavy heart.`},
  {category:'Family Time',emoji:'🧺',title:`The Family Picnic`,text:`It started raining right when the family reached the park for their picnic. Instead of going home sad, they spread the blanket on the living room floor for an indoor picnic instead.`,moral:`Family fun can happen anywhere.`},
  {category:'Family Time',emoji:'👶',title:`Baby Brother's First Steps`,text:`Little Zara cheered louder than anyone when her baby brother took his very first wobbly steps. She held out her arms so he would walk straight into them.`,moral:`Celebrating others makes memories sweeter.`},
  {category:'Family Time',emoji:'🌷',title:`Mama's Garden`,text:`Ishaan didn't like waking up early, but his mother asked him to help water her garden each morning. Slowly, he began to love watching the flowers bloom with her.`,moral:`Small routines with family become treasured moments.`},
  {category:'Family Time',emoji:'📖',title:`Dadi's Bedtime Stories`,text:`Every night, Dadi told a new story before bed, even when she was tired. One night the children surprised her by telling HER a story instead, and she smiled with happy tears.`,moral:`Love is a story we tell each other.`},
  {category:'Family Time',emoji:'🚗',title:`The Family Road Trip`,text:`The car ride felt very long and the kids grew bored. Papa started a silly singing game, and soon everyone was laughing so hard the miles flew by.`,moral:`Togetherness turns boredom into joy.`},
  {category:'Family Time',emoji:'🚲',title:`Helping Papa Fix the Bike`,text:`Papa's bicycle chain broke, and little Dev handed him each tool with great care. When the bike was fixed, Papa said Dev was his best little helper ever.`,moral:`Helping family feels better than any prize.`},
  {category:'Family Time',emoji:'🎂',title:`The Surprise Birthday`,text:`The whole family whispered and tiptoed around the house all day to keep a birthday surprise secret for Grandpa. When he walked in and saw everyone, his eyes filled with happy tears.`,moral:`A little secret can bring big joy.`},
  {category:'Family Time',emoji:'🎶',title:`Sister's Lullaby`,text:`Baby Riya couldn't sleep and cried every night. Her big sister Tara made up a silly, sweet lullaby just for her, and soon Riya slept peacefully to that same tune.`,moral:`Love finds creative ways to comfort others.`},

  // Nature & Seasons
  {category:'Nature & Seasons',emoji:'❄️',title:`The First Snowfall`,text:`Leela had never seen snow before and thought the white sky was falling apart. When her mother explained it was soft, cold snow, she ran outside laughing and made her very first snow angel.`,moral:`New things can turn worry into wonder.`},
  {category:'Nature & Seasons',emoji:'🌱',title:`The Seed That Waited`,text:`A tiny seed sat underground all winter, wondering if spring would ever come. One warm morning, sunlight finally reached it, and it grew into the tallest sunflower in the garden.`,moral:`Patience is rewarded in its own time.`},
  {category:'Nature & Seasons',emoji:'🌈',title:`The Rainbow After Rain`,text:`Kids were sad that rain ruined their outdoor game. But when the rain stopped, a giant rainbow stretched across the sky, and they forgot all about being upset.`,moral:`Something beautiful often follows a storm.`},
  {category:'Nature & Seasons',emoji:'🍂',title:`The Falling Leaves`,text:`Ana was sad to see the tree outside her window lose all its leaves in autumn. Her grandfather told her the tree was just resting, and fresh green leaves returned every spring.`,moral:`Endings often lead to new beginnings.`},
  {category:'Nature & Seasons',emoji:'🌻',title:`The Thirsty Garden`,text:`During a hot summer, the flowers in the community garden began to wilt. The children took turns watering them every evening, and soon the garden bloomed brighter than ever.`,moral:`Caring for nature brings it back to life.`},
  {category:'Nature & Seasons',emoji:'🪁',title:`The Windy Kite Day`,text:`On a very windy afternoon, everyone thought it was too wild to play outside. But it turned out to be the perfect day for flying kites higher than ever before.`,moral:`What seems like trouble can be a hidden opportunity.`},
  {category:'Nature & Seasons',emoji:'🐝',title:`The Busy Bees`,text:`Children were scared of bees buzzing near the flowers. Their teacher explained that bees help flowers grow by carrying pollen, and soon the kids watched them with wonder instead of fear.`,moral:`Understanding something makes it less scary.`},
  {category:'Nature & Seasons',emoji:'🌕',title:`The Moonlit Camp`,text:`The family went camping and worried it would be too dark at night. Instead, the full moon lit up the whole campsite like a magic lamp, and they told stories under its glow.`,moral:`Nature has its own kind of light.`},
  {category:'Nature & Seasons',emoji:'💧',title:`The Puddle Jumpers`,text:`After a rainy day, Sam's mother told him to avoid the muddy puddles. But she smiled and let him jump in just one big puddle, and his laughter was worth every muddy sock.`,moral:`A little mess can bring a lot of joy.`},
  {category:'Nature & Seasons',emoji:'🌻',title:`The Sunflower That Turned`,text:`A young sunflower always turned to follow the sun across the sky each day. A curious boy learned from his teacher that following the light is how the flower grows strong.`,moral:`Always turn toward what helps you grow.`},

  {category:'Silly & Funny',emoji:'🙃',title:`The Upside Down Day`,text:`Tommy woke up and decided to do everything backward for fun, wearing his shirt inside out and walking backward to breakfast. His whole family laughed and joined his silly game all day.`,moral:`A little silliness can bring a lot of laughter.`},
  {category:'Silly & Funny',emoji:'🦛',title:`The Hiccuping Hippo`,text:`A hippo got the hiccups right in the middle of the jungle talent show and couldn't stop! Every hiccup made a funny "HOOP" sound that made the whole audience burst out laughing.`,moral:`Sometimes our mistakes become the best part of the show.`},
  {category:'Silly & Funny',emoji:'🧦',title:`The Sock-Eating Dryer`,text:`Every week, one sock would mysteriously vanish from the laundry. The family joked that a hungry monster lived in the dryer, until they found a whole sock family hiding behind it!`,moral:`Silly mysteries have silly answers.`},
  {category:'Silly & Funny',emoji:'🥦',title:`The Dancing Broccoli`,text:`A little boy refused to eat his broccoli until his dad started making it "dance" across the plate with silly voices. Soon, dinner became the funniest part of the day.`,moral:`A little fun can make anything better.`},
  {category:'Silly & Funny',emoji:'🏃',title:`The Backwards Race`,text:`At the school fun fair, kids had to race while walking backward, and everyone kept bumping into each other giggling. Even the teachers joined in and fell over laughing in the grass.`,moral:`Some games are more fun when you're silly.`},
  {category:'Silly & Funny',emoji:'🦜',title:`The Talking Parrot's Joke`,text:`A parrot at the pet shop learned only one sentence: "Who's there?" Every customer got greeted with a surprise knock-knock joke, and the shop became the most popular one in town.`,moral:`A little humor brightens everyone's day.`},
  {category:'Silly & Funny',emoji:'🏰',title:`The Great Pillow Fort`,text:`Two brothers built the biggest pillow fort ever, using every cushion in the house. When their parents came home, they had to crawl through a tiny tunnel just to say hello!`,moral:`Imagination can build the silliest, best adventures.`},
  {category:'Silly & Funny',emoji:'🐘',title:`The Sneezing Elephant`,text:`An elephant with a tickly nose sneezed so hard, it blew away all the leaves from the trees around him! The other animals thought it was the funniest weather they'd ever seen.`,moral:`Even accidents can bring unexpected fun.`},
  {category:'Silly & Funny',emoji:'👟',title:`The Mismatched Shoes`,text:`Priya rushed to school wearing one red shoe and one blue shoe by mistake. Instead of feeling embarrassed, her whole class wore mismatched shoes the next day just for fun.`,moral:`What feels like a mistake can start a fun new trend.`},
  {category:'Silly & Funny',emoji:'👻',title:`The Giggling Ghost`,text:`A friendly ghost tried to scare visitors in an old house, but his "boo" always turned into a giggle instead. Eventually, everyone visited just to hear his silly, un-scary laugh.`,moral:`Being yourself is more fun than pretending to be scary.`},

  // Magic & Wonder
  {category:'Magic & Wonder',emoji:'⭐',title:`The Wishing Star`,text:`Every night, Naina wished on the brightest star in the sky for a puppy. One morning, she found a little lost puppy waiting at her doorstep, as if the star had heard her all along.`,moral:`Keep believing in your dreams.`},
  {category:'Magic & Wonder',emoji:'🖌️',title:`The Magic Paintbrush`,text:`A boy found an old paintbrush that made anything he painted come slightly to life. He painted a small garden, and real butterflies began to visit his window every day after.`,moral:`Imagination can make ordinary things magical.`},
  {category:'Magic & Wonder',emoji:'☂️',title:`The Enchanted Umbrella`,text:`Every time it rained, Meera's umbrella would glow with soft colors like a rainbow. She loved rainy days the most, dancing under her magical, glowing umbrella.`,moral:`Even gloomy days can hold hidden magic.`},
  {category:'Magic & Wonder',emoji:'🧸',title:`The Talking Teddy Bear`,text:`Late one night, Aarav's teddy bear whispered a bedtime story just for him. In the morning, he wasn't sure if it was a dream, but he hugged his teddy a little tighter that day.`,moral:`Wonder makes everyday things feel special.`},
  {category:'Magic & Wonder',emoji:'✨',title:`The Glowing Firefly Path`,text:`Lost in the woods at dusk, a group of friends were guided home by a trail of glowing fireflies lighting their path like tiny lanterns.`,moral:`Help can appear in the most magical ways.`},
  {category:'Magic & Wonder',emoji:'☁️',title:`The Cloud Castle`,text:`A little girl always imagined the fluffy clouds were floating castles in the sky. One dreamy afternoon nap, she imagined she visited one and met a cloud king before waking up.`,moral:`Dreams can take us on the best adventures.`},
  {category:'Magic & Wonder',emoji:'🐚',title:`The Singing Seashell`,text:`A boy found a seashell on the beach that softly hummed ocean songs whenever he held it to his ear. He kept it forever as his own little piece of magical sea music.`,moral:`Small wonders are worth treasuring.`},
  {category:'Magic & Wonder',emoji:'🍄',title:`The Invisible Garden Gnome`,text:`Strange little footprints appeared in the garden every morning, and vegetables grew faster than ever. The children decided a friendly invisible gnome must be helping their garden grow.`,moral:`A little magic makes ordinary chores exciting.`},
  {category:'Magic & Wonder',emoji:'🌠',title:`The Shooting Star Wish`,text:`Twin brothers saw a shooting star streak across the sky and each secretly made a wish. The next day, both wishes, for a sunny day to play cricket, came true together.`,moral:`Sharing wishes can double the wonder.`},
  {category:'Magic & Wonder',emoji:'🚪',title:`The Magic Library Door`,text:`A quiet library had one door that led to a different storybook world each time it opened. Curious readers who opened it always came back with the biggest smiles.`,moral:`Books can open magical new worlds.`},

  // Good Habits
  {category:'Good Habits',emoji:'🪥',title:`The Toothbrush Song`,text:`Ravi hated brushing his teeth until his sister made up a silly two-minute song about sparkly teeth. Soon, brushing became his favorite part of the morning and night.`,moral:`Good habits are easier with a little fun.`},
  {category:'Good Habits',emoji:'🧹',title:`The Tidy Room Challenge`,text:`Zara's room was always messy until she and her brother turned cleaning into a fun race against the clock. Now her room stays neat, and cleanup time is the best game of the day.`,moral:`Turning chores into games makes them easy.`},
  {category:'Good Habits',emoji:'🐓',title:`The Early Bird`,text:`Dev always woke up late and missed the best parts of the morning. Once he started waking up early with the rooster's crow, he discovered sunrise was the most beautiful part of the day.`,moral:`Waking up early opens up wonderful moments.`},
  {category:'Good Habits',emoji:'🧼',title:`The Handwashing Hero`,text:`Mia always forgot to wash her hands before meals until she learned tiny invisible germs could make her sick. Now she washes her hands proudly, calling herself a germ-fighting hero.`,moral:`Good habits keep us healthy and strong.`},
  {category:'Good Habits',emoji:'🦜',title:`The Polite Parrot`,text:`A parrot in the market only knew rude words until a kind girl taught him to say "please" and "thank you" instead. Soon, everyone loved visiting the shop just to hear him.`,moral:`Polite words make everyone happier.`},
  {category:'Good Habits',emoji:'📕',title:`The Book Before Bed`,text:`Instead of watching one more show, Aditi began reading one story every night before sleeping. Her dreams became more colorful, and her vocabulary grew bigger every day.`,moral:`A little reading each day makes a big difference.`},
  {category:'Good Habits',emoji:'🍇',title:`The Fruit Basket Challenge`,text:`Kabir only wanted candy until his mother turned trying new fruits into a fun weekly challenge with stickers as rewards. Soon, his favorite snack became a colorful fruit basket.`,moral:`Healthy habits can become your favorite ones.`},
  {category:'Good Habits',emoji:'⏰',title:`The Homework Timer`,text:`Instead of leaving homework for the last minute, Naina began setting a timer to finish it first, right after school. This left her a whole evening free to play without worry.`,moral:`Finishing tasks early brings more time for fun.`},
  {category:'Good Habits',emoji:'🚰',title:`The Water Bottle Buddy`,text:`Farhan always forgot to drink enough water until he decorated his own special water bottle and gave it a funny nickname. Now he remembers to sip all day long, staying healthy.`,moral:`Small reminders help build strong habits.`},
  {category:'Good Habits',emoji:'✉️',title:`The Thank You Note`,text:`After every birthday, Priya's mother helped her write a small thank-you note to everyone who gave her a gift. The neighbors always said her polite notes were the sweetest gifts.`,moral:`Gratitude is a gift you can give back.`},

  // Adventure Tales
  {category:'Adventure Tales',emoji:'🗺️',title:`The Treasure Map`,text:`Three friends found an old, torn map in the attic and followed its clues through the backyard. At the end, they dug up a small box filled with their grandfather's old marbles and coins.`,moral:`Adventures can be found close to home.`},
  {category:'Adventure Tales',emoji:'🌿',title:`The Jungle Explorer`,text:`Wearing a paper hat and holding a stick as his explorer's tool, little Ravi turned his backyard into a wild jungle every weekend, always coming back with a new discovery.`,moral:`Imagination turns anywhere into an adventure.`},
  {category:'Adventure Tales',emoji:'🛶',title:`The Boat Down the Stream`,text:`Two brothers built a tiny paper boat and raced it down the rain gutter stream after a storm. They cheered as it sailed all the way to the end, like true sea captains.`,moral:`Big adventures can start with small games.`},
  {category:'Adventure Tales',emoji:'🌳',title:`The Secret Treehouse Club`,text:`A group of friends built a secret treehouse with a rope ladder and a leafy roof. It became their special hideout for storytelling, snacks, and looking out over the neighborhood.`,moral:`A special place makes every gathering an adventure.`},

function renderStoryGallery(m){
  state.screen='storyGallery'; state.moduleId=m.id;
  $('#screenTitle').textContent = m.title;
  $('#screenSub').textContent = m.subtitle;
  mascotSay('Pick a story to enjoy! I will read it to you if you like.');
  let html = '<button class="back-link" id="backToMenu">⬅ Back to Garden</button>';
  html += '<div class="module-banner" style="background:linear-gradient(150deg,'+m.theme[0]+','+m.theme[1]+')">'
        + '<span class="big-icon">'+m.icon+'</span><h2>'+m.title+'</h2><p>'+m.subtitle+'</p></div>';
  STORY_CATEGORIES.forEach(cat=>{
    html += '<div class="gallery-section-title">'+cat+'</div><div class="gallery-grid">';
    STORIES.forEach((s,i)=>{
      if(s.category!==cat) return;
      html += '<button class="gallery-card" data-idx="'+i+'">'
            + '<div class="gthumb" style="display:flex;align-items:center;justify-content:center;font-size:40px;">'+s.emoji+'</div>'
            + '<div class="gname">'+s.title+'</div></button>';
    });

  });
  $('#screen').innerHTML = html;
  $('#backToMenu').addEventListener('click',()=>{playClick(); renderMenu();});

    card.addEventListener('click',()=>{
      playClick();
      openStoryReader(parseInt(card.dataset.idx,10));
    });
  });
}

function openStoryReader(index){
  openBigPreview(STORIES, index, {
    cardClass: 'story-card-mode',
    renderFn: renderStoryContent,
    onRenderFn: bindStoryReadButton
  });
}

function renderStoryContent(story){
  return '<div class="story-emoji">'+story.emoji+'</div>'
       + '<div class="story-title">'+story.title+'</div>'
       + '<div class="story-text">'+story.text+'</div>'

function bindStoryReadButton(story){

}

/* ---------------- BILINGUAL LEARNING CORNER: ENGINE ---------------- */
function langCornerLabels(m){
  if(m.lang==='hi-IN'){
    return { rhymes:'🎵 तुकबंदी', stories:'📖 कहानी', poems:'✍️ कविता',
      rhymesTitle:'तुकबंदी', storiesTitle:'कहानी', poemsTitle:'कविता',
      pick:'सुनने के लिए एक चुनें!', back:'⬅ वापस जाएं', read:'🔊 सुनिए' };
  }
  return { rhymes:'🎵 Rhymes', stories:'📖 Stories', poems:'✍️ Poems',
    rhymesTitle:'Rhymes', storiesTitle:'Stories', poemsTitle:'Poems',
    pick:'Pick one to enjoy!', back:'⬅ Back', read:'🔊 Read Aloud' };
}

function getCornerData(m, kind){
  if(m.lang==='hi-IN'){
    if(kind==='rhymes') return HI_RHYMES;
    if(kind==='poems') return HI_POEMS;
    return HI_STORIES;
  }
  if(kind==='rhymes') return EN_RHYMES;
  if(kind==='poems') return EN_POEMS;
  return STORIES.slice(0,50);
}

function renderLangCornerHome(m){
  state.screen='langCornerHome'; state.moduleId=m.id;
  const L = langCornerLabels(m);
  $('#screenTitle').textContent = m.title;
  $('#screenSub').textContent = m.subtitle;
  mascotSay(m.lang==='hi-IN' ? 'आइए, आज एक तुकबंदी, कहानी या कविता सुनते हैं!' : "Let's enjoy a rhyme, story, or poem today!");
  let html = '<div class="module-home">';
  html += '<button class="back-link" id="backToMenu">⬅ Back to Garden</button>';
  html += '<div class="module-banner" style="background:linear-gradient(150deg,'+m.theme[0]+','+m.theme[1]+')">'
        + '<span class="big-icon">'+m.icon+'</span><h2>'+m.title+'</h2><p>'+m.subtitle+'</p></div>';
  html += '<div class="choice-row">';
  html += '<button class="choice-btn" id="btnRhymes" style="background:linear-gradient(135deg,#EC407A,#FDD835)"><span class="cicon">🎵</span>'+L.rhymesTitle+'</button>';
  html += '<button class="choice-btn" id="btnStories" style="background:linear-gradient(135deg,#5E35B1,#26A69A)"><span class="cicon">📖</span>'+L.storiesTitle+'</button>';
  html += '<button class="choice-btn" id="btnPoems" style="background:linear-gradient(135deg,#1E88E5,#66BB6A)"><span class="cicon">✍️</span>'+L.poemsTitle+'</button>';
  html += '</div></div>';
  $('#screen').innerHTML = html;
  $('#backToMenu').addEventListener('click',()=>{playClick(); renderMenu();});
  $('#btnRhymes').addEventListener('click',()=>{playClick(); renderCornerGallery(m,'rhymes');});
  $('#btnStories').addEventListener('click',()=>{playClick(); renderCornerGallery(m,'stories');});
  $('#btnPoems').addEventListener('click',()=>{playClick(); renderCornerGallery(m,'poems');});
}

function renderCornerGallery(m, kind){
  state.screen='cornerGallery';
  const L = langCornerLabels(m);
  const data = getCornerData(m, kind);
  const titleMap = { rhymes:L.rhymesTitle, stories:L.storiesTitle, poems:L.poemsTitle };
  $('#screenTitle').textContent = titleMap[kind];
  $('#screenSub').textContent = m.title;
  mascotSay(L.pick);
  let html = '<button class="back-link" id="backToHome">'+L.back+'</button><div class="gallery-grid">';
  data.forEach(function(item,i){
    html += '<button class="gallery-card" data-idx="'+i+'"><div class="gthumb" style="display:flex;align-items:center;justify-content:center;font-size:40px;">'+item.emoji+'</div>'
          + '<div class="gname">'+item.title+'</div></button>';
  });
  html += '</div>';
  $('#screen').innerHTML = html;
  $('#backToHome').addEventListener('click',()=>{playClick(); renderLangCornerHome(m);});
  document.querySelectorAll('.gallery-card').forEach(function(card){
    card.addEventListener('click',function(){ playClick(); openCornerReader(m, kind, data, Number(card.dataset.idx)); });
  });
}

function cornerItemBody(item){
  if(item.text) return item.text;
  if(item.lyrics) return item.lyrics;
  if(item.lines) return item.lines.join('\n');
  return '';
}

function openCornerReader(m, kind, data, idx){
  openBigPreview(data, idx, {
    cardClass: 'story-card-mode',
    renderFn: function(item){ return renderCornerContent(item, m); },
    onRenderFn: function(item){ bindCornerReadButton(item, m); }
  });
}

function renderCornerContent(item, m){
  const L = langCornerLabels(m);
  const body = cornerItemBody(item).split('\n').join('<br>');
  let html = '<div class="story-emoji">'+item.emoji+'</div>'
       + '<div class="story-title">'+item.title+'</div>'
       + '<div class="story-text">'+body+'</div>';
  if(item.moral) html += '<div class="story-moral">✨ '+item.moral+'</div>';
  html += '<button class="tool-btn story-read-btn" id="cornerReadBtn">'+L.read+'</button>';
  return html;
}

function bindCornerReadButton(item, m){
  const btn = $('#cornerReadBtn');
  if(btn){
    btn.addEventListener('click', function(){
      const body = cornerItemBody(item).split('\n').join('. ');
      speak(item.title+'. '+body, m.lang);
    });
  }
}

/* --- Fullscreen game overlay helpers --- */
function openFullscreenGame(m, title, bodyHtml){
  closeFullscreenGame();
  const overlay = document.createElement('div');
  overlay.className = 'fsg-overlay';
  overlay.id = 'fsgOverlay';
  overlay.innerHTML =
      '<div class="fsg-header">'
    + '<button class="fsg-exit" id="fsgExitBtn">⬅ Exit</button>'
    + '<div class="fsg-title">'+title+'</div>'
    + '<div class="fsg-progress" id="fsgProgress"></div>'
    + '</div>'
    + '<div class="fsg-body" id="fsgBody">'+bodyHtml+'</div>';
  document.body.appendChild(overlay);
  $('#fsgExitBtn').addEventListener('click', function(){
    stopAllMousePracticeTimers();
    playClick();
    closeFullscreenGame();
    renderMousePracticeHome(m);
  });
}
function closeFullscreenGame(){
  const el = document.getElementById('fsgOverlay');
  if(el) el.remove();
}
function setFsgProgress(text){
  const el = document.getElementById('fsgProgress');
  if(el) el.textContent = text;
}
function stopAllMousePracticeTimers(){
  if(state.mouse && state.mouse.spawnId){ clearInterval(state.mouse.spawnId); state.mouse.spawnId = null; }
}

function renderMouseCategoryGallery(m, category){
  state.screen='mouseCategoryGallery';
  const themeMap = category==='pop' ? POP_THEMES : (category==='click' ? CLICK_THEMES : DRAG_THEMES);
  const catTitle = category==='pop' ? 'Pop & Catch Games' : (category==='click' ? 'Find & Click Games' : 'Drag & Feed Games');
  $('#screenTitle').textContent = catTitle;
  $('#screenSub').textContent = m.title;
  mascotSay('Pick a game to play!');
  let html = '<button class="back-link" id="backToHome">⬅ Back</button><div class="gallery-grid">';
  Object.keys(themeMap).forEach(function(key){
    const t = themeMap[key];
    const thumb = category==='drag' ? t.target : (t.emojis ? t.emojis[0] : '🎮');
    html += '<button class="gallery-card" data-key="'+key+'"><div class="gthumb" style="display:flex;align-items:center;justify-content:center;font-size:40px;">'+thumb+'</div>'
          + '<div class="gname">'+(t.title||t.label)+'</div></button>';
  });
  html += '</div>';
  $('#screen').innerHTML = html;
  $('#backToHome').addEventListener('click',()=>{playClick(); renderMousePracticeHome(m);});
  document.querySelectorAll('.gallery-card').forEach(function(card){
    card.addEventListener('click',function(){
      playClick();
      const key = card.dataset.key;
      if(category==='pop') startPopPractice(m, key);
      else if(category==='click') startClickPractice(m, key);
      else startDragPractice(m, key);
    });
  });
}

/* --- Pop & Catch engine --- */
function startPopPractice(m, themeKey){
  state.mouse = { activity:'pop', themeKey:themeKey, popped:0, goal:MOUSE_POP_GOAL, spawnId:null };
  renderPopPracticeScreen(m);
}

function renderPopPracticeScreen(m){
  const theme = POP_THEMES[state.mouse.themeKey];
  mascotSay(theme.swim ? 'Click to catch them!' : 'Click to pop them all!');
  const stageClass = theme.swim ? 'fsg-stage fish-stage' : 'fsg-stage';
  const body = '<div class="'+stageClass+'" id="popStage"></div>';
  openFullscreenGame(m, theme.title, body);
  setFsgProgress('Caught: 0 / '+state.mouse.goal);
  startPopSpawning(m);
}

function spawnPopItem(m){
  const theme = POP_THEMES[state.mouse.themeKey];
  const stage = document.getElementById('popStage');
  if(!stage) return;
  const emoji = theme.emojis[randInt(0,theme.emojis.length-1)];
  const el = document.createElement('button');
  el.className = theme.swim ? 'balloon fish-item' : 'balloon';
  el.textContent = emoji;
  if(theme.colored){ el.style.background = POP_COLORS[randInt(0,POP_COLORS.length-1)]; }
  else { el.style.background = 'transparent'; el.style.boxShadow = 'none'; }
  const duration = randInt(6,10);
  el.style.animationDuration = duration+'s';
  if(theme.swim){ el.style.top = randInt(8,85)+'%'; }

/* --- Drag & Feed engine --- */
function startDragPractice(m, themeKey){
  const cfg = DRAG_THEMES[themeKey];
  const items = shuffle(cfg.items.slice()).slice(0, Math.min(MOUSE_DRAG_MAX_ROUNDS, cfg.items.length));
  state.mouse = { activity:'drag', themeKey:themeKey, items:items, round:0, goal:items.length };
  renderDragRound(m);
}

function renderDragRound(m){
  const cfg = DRAG_THEMES[state.mouse.themeKey];
  const item = state.mouse.items[state.mouse.round];
  const emoji = (typeof item==='string') ? item : item.emoji;
  mascotSay(cfg.lang==='hi-IN' ? 'खाने को टोकरी में डालो!' : 'Drag it to the target!');
  const body = '<div class="fsg-stage dragdrop-stage" id="dragStage">'
    + '<button class="drag-item" id="dragItem">'+emoji+'</button>'
    + '<div class="drop-zone" id="dropZone">'+cfg.target+'</div>'
    + '</div>';
  openFullscreenGame(m, cfg.label, body);
  setFsgProgress('Round '+(state.mouse.round+1)+' / '+state.mouse.goal);
  setupDragItem(m);
}

function setupDragItem(m){
  const stage = document.getElementById('dragStage');
  const dragEl = document.getElementById('dragItem');
  const zoneEl = document.getElementById('dropZone');
  let dragging = false;
  function down(e){
    dragging = true;
    try{ dragEl.setPointerCapture(e.pointerId); }catch(err){}
    dragEl.classList.add('dragging');
  }
  function move(e){
    if(!dragging) return;
    const stageRect = stage.getBoundingClientRect();
    dragEl.style.left = (e.clientX - stageRect.left)+'px';
    dragEl.style.top = (e.clientY - stageRect.top)+'px';
  }
  function up(e){
    if(!dragging) return;
    const dragRect = dragEl.getBoundingClientRect();
    const zoneRect = zoneEl.getBoundingClientRect();
    const cx = dragRect.left+dragRect.width/2, cy = dragRect.top+dragRect.height/2;
    const hit = cx>zoneRect.left && cx<zoneRect.right && cy>zoneRect.top && cy<zoneRect.bottom;
    dragging = false;
    dragEl.classList.remove('dragging');
    if(hit){ handleDragSuccess(m); }
    else { dragEl.style.left=''; dragEl.style.top=''; }
  }
  dragEl.addEventListener('pointerdown', down);
  dragEl.addEventListener('pointermove', move);
  dragEl.addEventListener('pointerup', up);
  dragEl.addEventListener('pointercancel', up);
}

function handleDragSuccess(m){
  const cfg = DRAG_THEMES[state.mouse.themeKey];
  const item = state.mouse.items[state.mouse.round];
  const dragEl = document.getElementById('dragItem');
  if(dragEl){ dragEl.style.pointerEvents='none'; dragEl.classList.add('drag-success'); }
  playCorrect(); confettiBurst(); addStar();
  if(item && typeof item!=='string' && item.word){ speak(item.word, cfg.lang); }
  state.mouse.round++;
  setTimeout(function(){
    if(state.mouse.round>=state.mouse.goal){
      renderMousePracticeSummary(m, cfg.label);
    } else {
      renderDragRound(m);
    }
  }, 700);
}

function flattenPool(ids){
  const list = ids || CATEGORY_POOL_IDS;
  let pool = [];
  list.forEach(function(id){
    const mod = getModule(id);
    if(mod && mod.items){
      mod.items.forEach(function(it){ if(it.emoji) pool.push({emoji:it.emoji, label:it.label, cat:id}); });
    }
  });
  return pool;
}

const BALLOON_SETTINGS = {
  easy:{ duration:50, spawnMs:1500, distractors:2, rise:7, goal:8 },
  medium:{ duration:45, spawnMs:1150, distractors:3, rise:6, goal:10 },

function renderBalloonDifficulty(m){

    { easy:'50 second round', medium:'45 second round', tough:'40 second round' });
}

function startBalloonPop(m, difficulty){
  const cfg = BALLOON_SETTINGS[difficulty];
  arcade = {
    type:'balloon', difficulty:difficulty, pool: flattenPool(), score:0, hintsLeft:2,
    distractors:cfg.distractors, riseDuration:cfg.rise, timeLeft:cfg.duration,
    timerId:null, spawnTimerId:null, target:null,
    replay:function(){ startBalloonPop(m, difficulty); }
  };
  arcade.target = arcade.pool[randInt(0,arcade.pool.length-1)];

function renderBalloonGame(m, cfg){
  state.screen='balloon';
  $('#screenTitle').textContent = 'Balloon Pop';
  mascotSay('Pop the balloon that matches!');
  let html = '<button class="back-link" id="backToArcade">⬅ Exit</button>';
  html += '<div class="arcade-hud"><span id="balloonTimer">⏱ '+arcade.timeLeft+'s</span><span>⭐ <span id="balloonScore">0</span></span>'
        + '<button class="tool-btn" id="balloonHint">💡 Hint ('+arcade.hintsLeft+')</button></div>';
  html += '<div class="arcade-target" id="balloonTarget">Pop: '+arcade.target.emoji+' '+arcade.target.label+'</div>';
  html += '<div class="balloon-stage" id="balloonStage"></div>';
  $('#screen').innerHTML = html;
  $('#backToArcade').addEventListener('click',function(){ playClick(); stopBalloonGame(); renderArcadeHome(m); });
  $('#balloonHint').addEventListener('click', hintBalloon);
  speak('Pop the balloon with '+arcade.target.label, 'en-US');

  arcade.spawnTimerId = setInterval(spawnBalloon, cfg.spawnMs);
  arcade.timerId = setInterval(function(){
    arcade.timeLeft--;
    const te = document.getElementById('balloonTimer'); if(te) te.textContent='⏱ '+arcade.timeLeft+'s';
    if(arcade.timeLeft<=0){ endBalloonRound(m, cfg); }
  }, 1000);
  spawnBalloon();
}

function spawnBalloon(){
  if(!arcade || arcade.type!=='balloon') return;
  const stage = document.getElementById('balloonStage');
  if(!stage) return;
  const isTarget = Math.random() < (1/(arcade.distractors+1));
  let item;
  if(isTarget){ item = arcade.target; }
  else {
    let guard=0;
    do{ item = arcade.pool[randInt(0,arcade.pool.length-1)]; guard++; } while(item.label===arcade.target.label && guard<30);
  }
  const el = document.createElement('button');
  el.className='balloon';
  el.style.left = randInt(4,84)+'%';
  el.style.background = PALETTE[randInt(0,PALETTE.length-1)];
  el.style.animationDuration = arcade.riseDuration+'s';
  el.textContent = item.emoji;
  el.dataset.correct = (item.label===arcade.target.label) ? '1':'0';
  stage.appendChild(el);
  el.addEventListener('click', function(){ popBalloon(el); });
  el.addEventListener('animationend', function(){ if(el.parentNode) el.remove(); });
}

function popBalloon(el){
  if(!arcade || arcade.type!=='balloon' || el.dataset.popped==='1') return;
  el.dataset.popped='1';
  el.style.pointerEvents='none';
  const correct = el.dataset.correct==='1';
  if(correct){
    playCorrect(); addStar(); arcade.score++;
    el.style.transition='all .2s'; el.style.transform='scale(1.5)'; el.style.opacity='0';
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
    const se=document.getElementById('balloonScore'); if(se) se.textContent=arcade.score;
    arcade.target = arcade.pool[randInt(0,arcade.pool.length-1)];
    const tEl = document.getElementById('balloonTarget');
    if(tEl) tEl.textContent = 'Pop: '+arcade.target.emoji+' '+arcade.target.label;
    speak(arcade.target.label,'en-US');
  } else {
    playWrong();
    el.style.transition='all .2s'; el.style.transform='scale(.6) rotate(20deg)'; el.style.opacity='0';
  }
  setTimeout(function(){ if(el.parentNode) el.remove(); }, 200);
}

function hintBalloon(){
  if(!arcade || arcade.hintsLeft<=0) return;
  arcade.hintsLeft--;
  const btn = document.getElementById('balloonHint'); if(btn) btn.textContent='💡 Hint ('+arcade.hintsLeft+')';
  const stage = document.getElementById('balloonStage');
  if(!stage) return;
  stage.querySelectorAll('.balloon').forEach(function(b){
    if(b.dataset.correct==='1'){ b.classList.add('hint'); setTimeout(function(){ b.classList.remove('hint'); }, 1500); }
  });
  playClick();
}

function stopBalloonGame(){
  if(arcade){
    if(arcade.timerId) clearInterval(arcade.timerId);
    if(arcade.spawnTimerId) clearInterval(arcade.spawnTimerId);
  }
}

function endBalloonRound(m, cfg){
  stopBalloonGame();
  const stage = document.getElementById('balloonStage');
  if(stage) stage.innerHTML='';
  renderArcadeSummary(m, 'Balloon Pop', arcade.score, cfg.goal);
}

function renderOddOneOutDifficulty(m){
  renderDifficultyPicker(m, '🔍 Odd One Out', function(diff){ startOddOneOut(m, diff); }, renderArcadeHome,
    { easy:ARCADE_ROUND_COUNTS.easy+' rounds', medium:ARCADE_ROUND_COUNTS.medium+' rounds', tough:ARCADE_ROUND_COUNTS.tough+' rounds' });

function startOddOneOut(m, difficulty){
  arcade = {
    type:'odd', difficulty:difficulty, level:1, total:ARCADE_ROUND_COUNTS[difficulty], score:0,
    hintsLeft:2, replay:function(){ startOddOneOut(m, difficulty); }
  };
  nextOddOneOutQuestion(m);
}

function nextOddOneOutQuestion(m){
  if(arcade.level > arcade.total){ renderArcadeSummary(m, 'Odd One Out', arcade.score, arcade.total); return; }
  const cats = shuffle(CATEGORY_POOL_IDS).slice(0,2);
  const modA = getModule(cats[0]), modB = getModule(cats[1]);
  const poolA = modA.items.filter(function(it){return !!it.emoji;});
  const poolB = modB.items.filter(function(it){return !!it.emoji;});
  const same = shuffle(poolA).slice(0,3);
  const odd = poolB[randInt(0,poolB.length-1)];
  const options = shuffle(same.concat([odd]));
  arcade.current = { options:options, oddLabel:odd.label };
  renderOddOneOutQuestion(m);
}

function renderOddOneOutQuestion(m){
  const q = arcade.current;
  $('#screenTitle').textContent = 'Odd One Out';
  let html = '<button class="back-link" id="backToArcade">⬅ Exit</button>';
  html += '<div class="quiz-progress">Level '+arcade.level+' of '+arcade.total+' &nbsp;•&nbsp; ⭐ '+arcade.score+'</div>';
  html += '<div class="arcade-timer-bar"><div class="arcade-timer-fill" id="oddTimerFill" style="width:100%;"></div></div>';
  html += '<div class="magic-instruction">Find the one that does NOT belong!</div>';
  html += '<div class="options-grid">';
  q.options.forEach(function(opt,i){
    html += '<div class="opt-card" data-i="'+i+'"><div class="emoji" style="font-size:90px;">'+opt.emoji+'</div></div>';
  });
  html += '</div>';
  html += '<div class="choice-row"><button class="tool-btn" id="oddHint">💡 Hint ('+arcade.hintsLeft+')</button></div>';
  $('#screen').innerHTML = html;
  $('#backToArcade').addEventListener('click',function(){ playClick(); stopArcadeTimer(); renderArcadeHome(m); });
  $('#oddHint').addEventListener('click', hintOddOneOut);
  document.querySelectorAll('.opt-card').forEach(function(card){
    card.addEventListener('click', function(){
      const opt = q.options[card.dataset.i];
      handleOddOneOutAnswer(m, opt.label===q.oddLabel, card);
    });
  });
  startArcadeQuestionTimer(m, ARCADE_TIME_BY_DIFF[arcade.difficulty], 'oddTimerFill', function(){
    handleOddOneOutAnswer(m, false, null);
  });
}

function hintOddOneOut(){
  if(!arcade || arcade.hintsLeft<=0) return;
  arcade.hintsLeft--;
  const btn = document.getElementById('oddHint'); if(btn) btn.textContent='💡 Hint ('+arcade.hintsLeft+')';
  const q = arcade.current;
  let dimmed=0;
  document.querySelectorAll('.opt-card').forEach(function(card){
    const opt = q.options[card.dataset.i];
    if(opt.label!==q.oddLabel && dimmed<2){ card.style.opacity='0.3'; dimmed++; }
  });
  playClick();
}

function handleOddOneOutAnswer(m, isCorrect, card){
  stopArcadeTimer();
  document.querySelectorAll('.opt-card').forEach(function(c){ c.style.pointerEvents='none'; });
  const q = arcade.current;
  if(isCorrect){
    if(card) card.classList.add('correct');
    playCorrect(); confettiBurst(); addStar(); arcade.score++;
    profile.streak++; if(profile.streak>profile.bestStreak) profile.bestStreak=profile.streak; checkBadges();
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
  } else {
    if(card) card.classList.add('wrong');
    playWrong(); profile.streak=0;
    mascotSay(WRONG_MSGS[randInt(0,WRONG_MSGS.length-1)]);
    document.querySelectorAll('.opt-card').forEach(function(c){
      const opt = q.options[c.dataset.i];
      if(opt.label===q.oddLabel) c.classList.add('correct');
    });
  }
  setTimeout(function(){ arcade.level++; nextOddOneOutQuestion(m); }, isCorrect?900:1500);
}

const LETTER_HUNT_GRID_SIZE = { easy:12, medium:16, tough:20 };
const LETTER_HUNT_TIME = { easy:12, medium:9, tough:7 };

function renderLetterHuntDifficulty(m){
  renderDifficultyPicker(m, '🔤 Letter Hunt', function(diff){ startLetterHunt(m, diff); }, renderArcadeHome,
    { easy:ARCADE_ROUND_COUNTS.easy+' letters', medium:ARCADE_ROUND_COUNTS.medium+' letters', tough:ARCADE_ROUND_COUNTS.tough+' letters' });

function startLetterHunt(m, difficulty){
  arcade = {
    type:'letterhunt', difficulty:difficulty, level:1, total:ARCADE_ROUND_COUNTS[difficulty], score:0,
    hintsLeft:3, replay:function(){ startLetterHunt(m, difficulty); }
  };
  nextLetterHuntQuestion(m);
}

function nextLetterHuntQuestion(m){
  if(arcade.level > arcade.total){ renderArcadeSummary(m, 'Letter Hunt', arcade.score, arcade.total); return; }
  const target = ALPHABET_LIST[randInt(0,ALPHABET_LIST.length-1)];
  const gridSize = LETTER_HUNT_GRID_SIZE[arcade.difficulty];
  let letters = [target];
  let guard=0;
  while(letters.length<gridSize && guard<200){
    guard++;
    letters.push(ALPHABET_LIST[randInt(0,ALPHABET_LIST.length-1)]);
  }
  letters = shuffle(letters);
  arcade.current = { target:target, letters:letters };
  renderLetterHuntQuestion(m);
}

function renderLetterHuntQuestion(m){
  const q = arcade.current;
  $('#screenTitle').textContent = 'Letter Hunt';
  let html = '<button class="back-link" id="backToArcade">⬅ Exit</button>';
  html += '<div class="quiz-progress">Letter '+arcade.level+' of '+arcade.total+' &nbsp;•&nbsp; ⭐ '+arcade.score+'</div>';
  html += '<div class="arcade-timer-bar"><div class="arcade-timer-fill" id="letterTimerFill" style="width:100%;"></div></div>';
  html += '<div class="arcade-target">Find the letter: <span class="opt-letter">'+q.target+'</span></div>';
  html += '<div class="hunt-grid">';
  q.letters.forEach(function(l,i){ html += '<button class="hunt-tile" data-i="'+i+'">'+l+'</button>'; });
  html += '</div>';
  html += '<div class="choice-row"><button class="tool-btn" id="letterHint">💡 Hint ('+arcade.hintsLeft+')</button></div>';
  $('#screen').innerHTML = html;
  speak('Find the letter '+q.target, 'en-US');
  $('#backToArcade').addEventListener('click',function(){ playClick(); stopArcadeTimer(); renderArcadeHome(m); });
  $('#letterHint').addEventListener('click', hintLetterHunt);
  document.querySelectorAll('.hunt-tile').forEach(function(tile){
    tile.addEventListener('click', function(){
      const letter = q.letters[tile.dataset.i];
      handleLetterHuntAnswer(m, letter===q.target, tile);
    });
  });
  startArcadeQuestionTimer(m, LETTER_HUNT_TIME[arcade.difficulty], 'letterTimerFill', function(){
    handleLetterHuntAnswer(m, false, null);
  });
}

function hintLetterHunt(){
  if(!arcade || arcade.hintsLeft<=0) return;
  arcade.hintsLeft--;
  const btn = document.getElementById('letterHint'); if(btn) btn.textContent='💡 Hint ('+arcade.hintsLeft+')';
  const q = arcade.current;
  document.querySelectorAll('.hunt-tile').forEach(function(tile){
    if(q.letters[tile.dataset.i]===q.target){ tile.classList.add('hint'); setTimeout(function(){ tile.classList.remove('hint'); },1200); }
  });
  playClick();
}

function handleLetterHuntAnswer(m, isCorrect, tile){
  stopArcadeTimer();
  document.querySelectorAll('.hunt-tile').forEach(function(t){ t.style.pointerEvents='none'; });
  const q = arcade.current;
  if(isCorrect){
    if(tile) tile.classList.add('correct');
    playCorrect(); confettiBurst(); addStar(); arcade.score++;
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
  } else {
    if(tile) tile.classList.add('wrong');
    playWrong();
    mascotSay(WRONG_MSGS[randInt(0,WRONG_MSGS.length-1)]);
    document.querySelectorAll('.hunt-tile').forEach(function(t){ if(q.letters[t.dataset.i]===q.target) t.classList.add('correct'); });
  }
  setTimeout(function(){ arcade.level++; nextLetterHuntQuestion(m); }, isCorrect?800:1500);
}

/* ---- Number Race ---- */
const NUMBER_RACE_MAX = { easy:8, medium:10, tough:12 };
const NUMBER_RACE_TIME = { easy:35, medium:30, tough:25 };
const NUMBER_RACE_ROUNDS = { easy:5, medium:6, tough:5 };

function renderNumberRaceDifficulty(m){
  renderDifficultyPicker(m, '🔢 Number Race', function(diff){ startNumberRace(m, diff); }, renderArcadeHome,
    { easy:'Count to 8', medium:'Count to 10', tough:'Count to 12' });
}

function startNumberRace(m, difficulty){
  arcade = {
    type:'numberrace', difficulty:difficulty, level:1, total:NUMBER_RACE_ROUNDS[difficulty],
    score:0, hintsLeft:3, replay:function(){ startNumberRace(m, difficulty); }
  };
  nextNumberRaceLevel(m);
}

function nextNumberRaceLevel(m){
  if(arcade.level > arcade.total){ renderArcadeSummary(m, 'Number Race', arcade.score, arcade.total); return; }
  const maxN = NUMBER_RACE_MAX[arcade.difficulty];
  let numbers=[];
  for(let i=1;i<=maxN;i++) numbers.push(i);
  for(let i=0;i<4;i++){ numbers.push(maxN+1+randInt(1,10)); }
  numbers = shuffle(numbers);
  arcade.current = { numbers:numbers, next:1, maxN:maxN };
  renderNumberRaceLevel(m);
}

function renderNumberRaceLevel(m){
  const q = arcade.current;
  $('#screenTitle').textContent = 'Number Race';
  let html = '<button class="back-link" id="backToArcade">⬅ Exit</button>';
  html += '<div class="quiz-progress">Round '+arcade.level+' of '+arcade.total+' &nbsp;•&nbsp; ⭐ '+arcade.score+'</div>';
  html += '<div class="arcade-timer-bar"><div class="arcade-timer-fill" id="raceTimerFill" style="width:100%;"></div></div>';
  html += '<div class="race-track"><div class="race-runner" id="raceRunner" style="left:0%;">🏃</div><div class="race-flag">🏁</div></div>';
  html += '<div class="arcade-target">Tap numbers in order! Next: <span class="opt-letter" id="raceNext">'+q.next+'</span></div>';
  html += '<div class="hunt-grid">';
  q.numbers.forEach(function(n,i){ html += '<button class="hunt-tile" data-i="'+i+'">'+n+'</button>'; });
  html += '</div>';
  html += '<div class="choice-row"><button class="tool-btn" id="raceHint">💡 Hint ('+arcade.hintsLeft+')</button></div>';
  $('#screen').innerHTML = html;
  $('#backToArcade').addEventListener('click',function(){ playClick(); stopArcadeTimer(); renderArcadeHome(m); });
  $('#raceHint').addEventListener('click', hintNumberRace);
  document.querySelectorAll('.hunt-tile').forEach(function(tile){
    tile.addEventListener('click', function(){ tapNumberRaceTile(m, tile); });
  });
  startArcadeQuestionTimer(m, NUMBER_RACE_TIME[arcade.difficulty], 'raceTimerFill', function(){
    endNumberRaceLevel(m);
  });
}

function hintNumberRace(){
  if(!arcade || arcade.hintsLeft<=0) return;
  arcade.hintsLeft--;
  const btn=document.getElementById('raceHint'); if(btn) btn.textContent='💡 Hint ('+arcade.hintsLeft+')';
  const q = arcade.current;
  document.querySelectorAll('.hunt-tile').forEach(function(tile){
    if(parseInt(tile.textContent,10)===q.next && !tile.disabled){ tile.classList.add('hint'); setTimeout(function(){tile.classList.remove('hint');},1200); }
  });
  playClick();
}

function tapNumberRaceTile(m, tile){
  const q = arcade.current;
  const n = parseInt(tile.textContent,10);
  if(tile.disabled) return;
  if(n===q.next){
    tile.disabled=true; tile.classList.add('correct');
    playCorrect(); addStar(); arcade.score++;
    q.next++;
    const pct = Math.min(100, Math.round(((q.next-1)/q.maxN)*100));
    const runner = document.getElementById('raceRunner'); if(runner) runner.style.left = pct+'%';
    const nextLabel = document.getElementById('raceNext'); if(nextLabel) nextLabel.textContent = q.next<=q.maxN ? q.next : '🎉';
    if(q.next>q.maxN){
      stopArcadeTimer();
      confettiBurst();
      mascotSay('You finished the race! 🏁');
      setTimeout(function(){ arcade.level++; nextNumberRaceLevel(m); }, 1200);
    }
  } else {
    playWrong();
    tile.classList.add('wrong');
    setTimeout(function(){ tile.classList.remove('wrong'); }, 400);
  }
}

function endNumberRaceLevel(m){
  mascotSay('Time is up! Let us try the next one!');
  setTimeout(function(){ arcade.level++; nextNumberRaceLevel(m); }, 1000);
}

/* ---- Sorting ---- */
function renderSortingDifficulty(m){
  renderDifficultyPicker(m, '🧺 Sorting', function(diff){ startSorting(m, diff); }, renderArcadeHome,
    { easy:ARCADE_ROUND_COUNTS.easy+' items', medium:ARCADE_ROUND_COUNTS.medium+' items', tough:ARCADE_ROUND_COUNTS.tough+' items' });
}

function startSorting(m, difficulty){
  const cats = shuffle(CATEGORY_POOL_IDS).slice(0,2);
  arcade = {
    type:'sorting', difficulty:difficulty, level:1, total:ARCADE_ROUND_COUNTS[difficulty], score:0,
    hintsLeft:2, modA:getModule(cats[0]), modB:getModule(cats[1]),
    replay:function(){ startSorting(m, difficulty); }
  };
  nextSortingQuestion(m);
}

function nextSortingQuestion(m){
  if(arcade.level > arcade.total){ renderArcadeSummary(m, 'Sorting', arcade.score, arcade.total); return; }
  const fromA = Math.random()<0.5;
  const srcMod = fromA ? arcade.modA : arcade.modB;
  const pool = srcMod.items.filter(function(it){return !!it.emoji;});
  const item = pool[randInt(0,pool.length-1)];
  arcade.current = { item:item, correctBin: fromA?'A':'B' };
  renderSortingQuestion(m);
}

function renderSortingQuestion(m){
  const q = arcade.current;
  $('#screenTitle').textContent = 'Sorting';
  let html = '<button class="back-link" id="backToArcade">⬅ Exit</button>';
  html += '<div class="quiz-progress">Item '+arcade.level+' of '+arcade.total+' &nbsp;•&nbsp; ⭐ '+arcade.score+'</div>';
  html += '<div class="arcade-timer-bar"><div class="arcade-timer-fill" id="sortTimerFill" style="width:100%;"></div></div>';
  html += '<div class="sort-item-card"><div class="emoji" style="font-size:110px;">'+q.item.emoji+'</div><div class="card-label">'+q.item.label+'</div></div>';
  html += '<div class="sort-bins-row">';
  html += '<button class="sort-bin" data-bin="A" style="background:linear-gradient(135deg,'+arcade.modA.theme[0]+','+arcade.modA.theme[1]+')">'+arcade.modA.icon+'<br>'+arcade.modA.title+'</button>';
  html += '<button class="sort-bin" data-bin="B" style="background:linear-gradient(135deg,'+arcade.modB.theme[0]+','+arcade.modB.theme[1]+')">'+arcade.modB.icon+'<br>'+arcade.modB.title+'</button>';
  html += '</div>';
  html += '<div class="choice-row"><button class="tool-btn" id="sortHint">💡 Hint ('+arcade.hintsLeft+')</button></div>';
  $('#screen').innerHTML = html;
  $('#backToArcade').addEventListener('click',function(){ playClick(); stopArcadeTimer(); renderArcadeHome(m); });
  $('#sortHint').addEventListener('click', hintSorting);
  document.querySelectorAll('.sort-bin').forEach(function(bin){
    bin.addEventListener('click', function(){ handleSortingAnswer(m, bin.dataset.bin===q.correctBin, bin); });
  });
  startArcadeQuestionTimer(m, ARCADE_TIME_BY_DIFF[arcade.difficulty], 'sortTimerFill', function(){
    handleSortingAnswer(m, false, null);
  });
}

function hintSorting(){
  if(!arcade || arcade.hintsLeft<=0) return;
  arcade.hintsLeft--;
  const btn=document.getElementById('sortHint'); if(btn) btn.textContent='💡 Hint ('+arcade.hintsLeft+')';
  const q = arcade.current;
  document.querySelectorAll('.sort-bin').forEach(function(bin){
    if(bin.dataset.bin===q.correctBin){ bin.classList.add('hint'); setTimeout(function(){bin.classList.remove('hint');},1200); }
  });
  playClick();
}

function handleSortingAnswer(m, isCorrect, bin){
  stopArcadeTimer();
  document.querySelectorAll('.sort-bin').forEach(function(b){ b.style.pointerEvents='none'; });
  const q = arcade.current;
  if(isCorrect){
    if(bin) bin.classList.add('correct');
    playCorrect(); confettiBurst(); addStar(); arcade.score++;
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
  } else {
    if(bin) bin.classList.add('wrong');
    playWrong();
    mascotSay(WRONG_MSGS[randInt(0,WRONG_MSGS.length-1)]);
    document.querySelectorAll('.sort-bin').forEach(function(b){ if(b.dataset.bin===q.correctBin) b.classList.add('correct'); });
  }
  setTimeout(function(){ arcade.level++; nextSortingQuestion(m); }, isCorrect?900:1500);
}

/* ---------------- SUMMARY ---------------- */
function renderSummary(m){
  state.screen='summary';
  $('#screenTitle').textContent = m.title+' — Great Job!';
  const total = state.queue.length;
  const great = state.score === total;
  recordActivityComplete(m.title+' Quiz', great);
  mascotSay(great ? "Wow, perfect score! You're a champion! 🏆" : "Nice work! Let's keep practicing! 🦊");
  let html = '<div class="summary">';
  html += '<span class="emoji-big">'+(great?'🏆':'🎉')+'</span>';
  html += '<h2>You scored '+state.score+' / '+total+' ⭐</h2>';
  html += '<p>'+(great ? 'Perfect! You know this so well!' : 'Great effort — try again to get more stars!')+'</p>';
  html += '<div class="summary-actions">';
  html += '<button class="choice-btn" id="playAgain" style="background:linear-gradient(135deg,'+m.theme[0]+','+m.theme[1]+')"><span class="cicon">🔁</span>Play Again</button>';
  html += '<button class="choice-btn" id="toHome" style="background:linear-gradient(135deg,'+m.theme[1]+','+m.theme[0]+')"><span class="cicon">🏡</span>Module Home</button>';
  html += '<button class="choice-btn" id="toMenu" style="background:linear-gradient(135deg,#9575CD,#29B6F6)"><span class="cicon">🌈</span>Garden</button>';
  html += '</div></div>';
  $('#screen').innerHTML = html;
  $('#playAgain').addEventListener('click',()=>{
    playClick();
    if(m.type==='count') startCountQuiz(m);
    else if(m.type==='hundred') startHundredQuiz(m);
    else startQuiz(m);
  });
  $('#toHome').addEventListener('click',()=>{ playClick(); openModule(m.id); });
  $('#toMenu').addEventListener('click',()=>{ playClick(); renderMenu(); });
  if(great) confettiBurst();
}

/* ---------------- INIT ---------------- */
$('#homeBtn').addEventListener('click',()=>{
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  playClick(); renderMenu();
});

const screenEl = document.getElementById('screen');
if(screenEl){
  const screenObserver = new MutationObserver(()=>{
    screenEl.classList.remove('screen-fade-in');
    void screenEl.offsetWidth;
    screenEl.classList.add('screen-fade-in');
  });
  screenObserver.observe(screenEl, {childList:true});
}

renderMenu();
</script>
