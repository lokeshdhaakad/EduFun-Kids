<style>
  :root{
    --yellow:#FFC93C; --blue:#29B6F6; --green:#66BB6A; --pink:#FF6FA5;
    --orange:#FF8A3D; --purple:#9575CD; --red:#E53935; --teal:#26A69A;
    --ink:#3A3247; --card:#FFFFFF; --bg1:#FFF6E9; --bg2:#EAF8FF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Trebuchet MS','Segoe UI','Verdana',sans-serif;
    color:var(--ink);
    background:#BEE3F8;
    min-height:100%;
    overflow-x:hidden;
  }
  .app{max-width:920px;margin:0 auto;padding:14px 14px 90px;min-height:100vh;position:relative;}

  /* header */
  .topbar{
    position:sticky;top:10px;z-index:30;display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.85);backdrop-filter:blur(6px);
    border-radius:22px;padding:10px 14px;box-shadow:0 6px 18px rgba(80,60,120,.15);
    margin-bottom:18px;
  }
  .home-btn{
    width:46px;height:46px;border-radius:50%;border:none;font-size:22px;cursor:pointer;
    background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;
    box-shadow:0 4px 10px rgba(0,0,0,.15);flex:none;
  }
  .home-btn:active{transform:scale(.92);}
  .topbar .title-wrap{flex:1;min-width:0;}
  .topbar h1{font-size:18px;margin:0;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .sub{font-size:11px;color:#8a819c;font-weight:600;}
  .star-badge{
    background:linear-gradient(135deg,#FFD54F,#FFA726);color:#5a3d00;font-weight:800;
    border-radius:16px;padding:8px 12px;font-size:14px;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,.12);
    transition:transform .25s;
  }
  .star-badge.pop{animation:starpop .5s ease;}

  #screen{padding-bottom:20px;}

  /* menu grid */

  }

  }
  @keyframes heroLogoPop{0%{transform:scale(.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .hero{text-align:center;margin:6px 0 20px;}
  .hero h2{font-size:26px;margin:0 0 4px;}
  .hero p{margin:0;color:#7c7290;font-weight:600;font-size:14px;}
  .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;}
  .mod-card{

  .mod-card .mtitle{font-size:16px;font-weight:800;display:block;}
  .mod-card .msub{font-size:11px;opacity:.92;font-weight:600;display:block;margin-top:2px;}

  /* module home */
  .module-home{text-align:center;padding:10px 0;}
  .module-banner{
    border-radius:28px;padding:26px 16px;color:#fff;margin-bottom:22px;
    box-shadow:0 10px 24px rgba(60,30,80,.2);

  .module-banner .big-icon{font-size:54px;display:block;margin-bottom:6px;}
  .module-banner h2{margin:0;font-size:24px;}

  .choice-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
  .choice-btn{
    border:none;cursor:pointer;border-radius:22px;padding:22px 28px;min-width:150px;
    font-size:17px;font-weight:800;color:#fff;box-shadow:0 6px 0 rgba(0,0,0,.15);
  }
  .choice-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.15);}
  .choice-btn .cicon{font-size:30px;display:block;margin-bottom:6px;}
  .back-link{
    display:inline-block;margin-bottom:14px;border:none;background:rgba(255,255,255,.8);
    border-radius:16px;padding:8px 16px;font-weight:800;cursor:pointer;color:var(--ink);
    box-shadow:0 3px 8px rgba(0,0,0,.1);
  }

  /* learn grid */
  .learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
  .learn-card{
    background:var(--card);border-radius:20px;padding:14px 8px;text-align:center;cursor:pointer;
    box-shadow:0 5px 14px rgba(60,30,80,.14);border:3px solid transparent;transition:transform .15s;
  }
  .learn-card:active{transform:scale(.94);}
  .learn-card.talking{animation:bounce .5s ease;border-color:var(--yellow);}
  @keyframes bounce{0%{transform:translateY(0)}30%{transform:translateY(-10px)}55%{transform:translateY(0)}75%{transform:translateY(-5px)}100%{transform:translateY(0)}}
  .visual{display:flex;align-items:center;justify-content:center;min-height:clamp(100px,26vw,150px);}
  .emoji{line-height:1;}
  .card-label{margin-top:8px;font-weight:800;font-size:13px;color:var(--ink);word-break:break-word;}
  .card-symbol{font-size:22px;font-weight:900;color:var(--purple);}
  .swatch{border-radius:14px;box-shadow:inset 0 -4px 8px rgba(0,0,0,.12);}
  .stars-count{line-height:1.2;word-break:break-word;}

  /* quiz */
  .quiz-top{text-align:center;margin-bottom:6px;}
  .quiz-progress{font-weight:800;color:#8a819c;font-size:13px;margin-bottom:10px;}
  .prompt-card{
    border-radius:26px;padding:26px 14px;margin-bottom:20px;color:#fff;text-align:center;
    box-shadow:0 10px 22px rgba(60,30,80,.2);position:relative;
  }
  .prompt-card .ask{font-size:13px;font-weight:700;opacity:.9;margin-bottom:8px;}
  .prompt-word{font-size:34px;font-weight:900;letter-spacing:1px;}
  .repeat-btn{
    margin-top:12px;border:none;background:rgba(255,255,255,.9);color:var(--ink);
    border-radius:16px;padding:8px 16px;font-weight:800;cursor:pointer;font-size:13px;
  }
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:640px;margin:0 auto;}
  .opt-card{
    background:var(--card);border-radius:26px;padding:18px 10px;cursor:pointer;border:4px solid transparent;
    box-shadow:0 6px 16px rgba(60,30,80,.14);text-align:center;min-height:clamp(170px,38vw,230px);
    display:flex;align-items:center;justify-content:center;transition:transform .12s;
  }
  .opt-card:active{transform:scale(.95);}
  .opt-letter{font-size:clamp(60px,16vw,92px);font-weight:900;color:var(--purple);}
  .opt-text{font-size:clamp(19px,5vw,26px);font-weight:800;color:var(--ink);}
  .opt-card.correct{border-color:#43A047;background:#E8F8EA;animation:pulseGreen .5s ease;}
  .opt-card.wrong{border-color:#E53935;background:#FDEAEA;animation:shake .45s ease;}
  @keyframes pulseGreen{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  .count-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;min-height:80px;margin:6px 0 4px;}

  /* maths tables */
  .table-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:12px;margin-bottom:20px;}
  .table-num-btn{
    border:none;cursor:pointer;border-radius:18px;padding:16px 8px;font-size:20px;font-weight:900;color:#fff;
    box-shadow:0 5px 0 rgba(0,0,0,.15);background:linear-gradient(135deg,#8E24AA,#5E35B1);
  }
  .table-num-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .table-list{max-width:420px;margin:0 auto 18px;}
  .table-row{
    display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:16px;
    padding:12px 18px;margin-bottom:8px;font-weight:800;font-size:17px;box-shadow:0 4px 10px rgba(60,30,80,.12);cursor:pointer;
  }
  .table-row:active{transform:scale(.97);}

  /* counting to 100 */
  .num100-grid{grid-template-columns:repeat(auto-fill,minmax(52px,1fr)) !important;gap:8px !important;}
  .num100-card{padding:12px 4px !important;font-size:16px;font-weight:800;min-height:auto !important;}

  /* letter forms */
  .lf-big{font-size:42px;font-weight:800;color:var(--ink);}
  .lf-cursive{font-family:'Brush Script MT','Segoe Script','Lucida Handwriting',cursive;font-weight:400;font-style:italic;font-size:44px;color:var(--purple);}

  /* coloring gallery */
  .gallery-section-title{font-size:16px;font-weight:900;margin:18px 0 10px;color:var(--ink);padding-left:4px;}
  .gallery-section-title:first-child{margin-top:0;}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-bottom:6px;}
  .gallery-card{
    background:#fff;border-radius:18px;padding:10px 6px;text-align:center;cursor:pointer;border:none;
    box-shadow:0 5px 12px rgba(60,30,80,.13);transition:transform .15s;
  }
  .gallery-card:active{transform:scale(.94);}
  .gallery-card .gthumb{width:64px;height:64px;margin:0 auto 4px;}
  .gallery-card .gname{font-size:11.5px;font-weight:800;color:var(--ink);}

  /* coloring canvas screen */
  .color-header{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
  .ref-box{text-align:center;}
  .ref-label{font-size:11px;font-weight:800;color:#8a819c;margin-bottom:4px;}
  .ref-thumb{width:64px;height:64px;background:#fff;border-radius:14px;box-shadow:0 4px 10px rgba(60,30,80,.15);padding:4px;}
  .color-title{font-size:20px;margin:0;}
  .coloring-stage{
    position:relative;width:100%;max-width:460px;aspect-ratio:1/1;margin:0 auto 16px;
    background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 10px 24px rgba(60,30,80,.2);
    border:5px solid #fff;touch-action:none;
  }
  .coloring-stage canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}
  .coloring-stage .outline-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  .coloring-stage .outline-overlay svg{display:block;width:100%;height:100%;}

  .toolbar{max-width:460px;margin:0 auto;}
  .tool-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .swatch-btn{
    width:34px;height:34px;border-radius:50%;border:3px solid #fff;cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.18);flex:none;
  }
  .swatch-btn.selected{border-color:var(--ink);transform:scale(1.15);}
  .tool-btn{
    border:none;cursor:pointer;background:#fff;border-radius:14px;padding:10px 14px;font-weight:800;font-size:13px;
    box-shadow:0 4px 10px rgba(60,30,80,.15);color:var(--ink);
  }
  .tool-btn:active{transform:scale(.94);}
  .tool-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
  .brush-size-label{font-weight:900;min-width:36px;text-align:center;font-size:14px;}
  .brush-row span:first-child{font-weight:800;font-size:13px;}

  /* magic corner */
  .magic-instruction{text-align:center;font-weight:700;color:#7c7290;margin-bottom:14px;font-size:14px;}
  .magic-slot-label{text-align:center;font-weight:800;font-size:13px;color:var(--ink);margin:12px 0 6px;}
  .magic-stage{
    position:relative;min-height:150px;display:flex;align-items:center;justify-content:center;
    margin:10px 0 18px;background:#fff;border-radius:22px;box-shadow:0 8px 20px rgba(60,30,80,.15);padding:16px;
    flex-direction:column;
  }
  .magic-blob{width:70px;height:70px;border-radius:50%;position:absolute;box-shadow:0 6px 16px rgba(0,0,0,.2);}
  .blob-a{animation:mergeLeft .7s ease forwards;}
  .blob-b{animation:mergeRight .7s ease forwards;}
  @keyframes mergeLeft{0%{transform:translateX(-60px) scale(1);}100%{transform:translateX(0) scale(.85);}}
  @keyframes mergeRight{0%{transform:translateX(60px) scale(1);}100%{transform:translateX(0) scale(.85);}}
  .magic-result-circle{width:110px;height:110px;border-radius:50%;box-shadow:0 8px 20px rgba(0,0,0,.25);animation:popIn .5s ease;border:4px solid #fff;}
  .magic-result-label{text-align:center;font-weight:900;font-size:20px;margin-top:12px;color:var(--ink);}
  @keyframes popIn{0%{transform:scale(0);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
  .magic-step{
    background:#F3E5F5;border-radius:14px;padding:10px 18px;margin-bottom:8px;font-weight:800;
    box-shadow:0 3px 8px rgba(60,30,80,.1);text-align:center;animation:slideIn .4s ease;width:100%;max-width:280px;
  }
  @keyframes slideIn{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0);}}
  .magic-spin{font-size:60px;text-align:center;animation:spinIt .5s linear;}
  @keyframes spinIt{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
  .magic-reveal-emoji{font-size:80px;text-align:center;line-height:1;animation:popIn .5s ease;}
  .magic-num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:360px;margin:0 auto 8px;}
  .magic-num-btn{
    border:none;cursor:pointer;border-radius:16px;padding:16px 0;font-size:20px;font-weight:900;color:#fff;
    background:linear-gradient(135deg,#5E35B1,#EC407A);box-shadow:0 5px 0 rgba(0,0,0,.15);
  }
  .magic-num-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .magic-letter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;max-width:460px;margin:0 auto 8px;}
  .magic-letter-btn{
    border:none;cursor:pointer;border-radius:12px;padding:10px 0;font-size:16px;font-weight:900;color:#fff;
    background:linear-gradient(135deg,#5E35B1,#EC407A);box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .magic-letter-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15);}

  /* musical instruments */
  .now-playing-label{text-align:center;font-weight:900;font-size:18px;margin:6px 0 16px;color:var(--ink);min-height:26px;}
  .instrument-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .piano-wrap{
    position:relative;display:flex;height:170px;background:#2b2b2b;border-radius:16px;padding:6px;gap:2px;
    box-shadow:0 10px 24px rgba(0,0,0,.3);max-width:460px;margin:16px auto;touch-action:manipulation;
  }
  .piano-white{
    flex:1;background:#fff;border:none;border-radius:0 0 10px 10px;box-shadow:inset 0 -6px 10px rgba(0,0,0,.08);
    cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;
    font-weight:800;color:#999;position:relative;z-index:1;touch-action:manipulation;
  }
  .piano-white.pressed{background:#ffe1ee;}
  .piano-black{
    position:absolute;top:6px;width:8%;height:60%;background:#141414;border:none;border-radius:0 0 6px 6px;
    cursor:pointer;z-index:2;box-shadow:0 4px 8px rgba(0,0,0,.4);touch-action:manipulation;
  }
  .piano-black.pressed{background:#EC407A;}
  .string-key{
    border:none;cursor:pointer;border-radius:14px;padding:20px 16px;font-weight:900;font-size:18px;color:#fff;
    background:linear-gradient(135deg,#6D4C41,#3E2723);box-shadow:0 6px 0 rgba(0,0,0,.2);min-width:44px;touch-action:manipulation;
  }
  .string-key.pressed{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.2);}
  .drum-pad{
    width:84px;height:84px;border-radius:50%;border:none;cursor:pointer;color:#fff;font-weight:900;font-size:15px;
    background:radial-gradient(circle at 35% 30%, #a1785a, #4E342E);box-shadow:0 8px 0 rgba(0,0,0,.25);touch-action:manipulation;
  }
  .drum-pad.pressed{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,.25);}

  /* mind games: shape fit */
  .diff-btn{
    border:none;cursor:pointer;border-radius:20px;padding:22px 20px;font-weight:900;font-size:17px;color:#fff;
    box-shadow:0 6px 0 rgba(0,0,0,.15);text-align:center;min-width:140px;
  }
  .diff-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.15);}
  .diff-btn .diff-sub{display:block;font-size:11.5px;font-weight:700;opacity:.9;margin-top:4px;}
  .fit-slot{
    width:150px;height:150px;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;
    background:#ECEFF1;border-radius:22px;border:5px dashed #B0BEC5;
  }
  .fit-options-row{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
  .fit-option{border:none;background:#fff;border-radius:18px;padding:10px;cursor:pointer;box-shadow:0 5px 12px rgba(60,30,80,.15);border:4px solid transparent;}
  .fit-option:active{transform:scale(.94);}
  .fit-option.correct{border-color:#43A047;background:#E8F8EA;animation:pulseGreen .5s ease;}
  .fit-option.wrong{border-color:#E53935;background:#FDEAEA;animation:shake .45s ease;}

  /* mind games: memory match */
  .memory-grid{display:grid;gap:12px;justify-content:center;margin:10px auto;max-width:520px;}
  .memory-grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .memory-grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .memory-card{
    aspect-ratio:1/1;border-radius:16px;border:none;cursor:pointer;font-size:clamp(30px,9vw,50px);display:flex;align-items:center;
    justify-content:center;background:linear-gradient(135deg,#5E35B1,#8E24AA);box-shadow:0 4px 10px rgba(60,30,80,.2);
    color:#fff;min-width:0;
  }
  .memory-card.flipped{background:#fff;color:var(--ink);}
  .memory-card.matched{background:#E8F8EA;border:3px solid #43A047;color:var(--ink);}

  /* mind games: shared timer + hint */
  .game-timer-row{display:flex;align-items:center;gap:10px;max-width:360px;margin:0 auto 14px;}
  .game-timer-bar,.arcade-timer-bar{flex:1;height:16px;background:#F0EAF7;border-radius:10px;overflow:hidden;max-width:400px;margin:0 auto 16px;}
  .game-timer-fill,.arcade-timer-fill{height:100%;background:linear-gradient(90deg,#66BB6A,#FDD835,#E53935);border-radius:10px;transition:width 1s linear;}
  .game-timer-text{font-weight:900;font-size:13px;color:var(--ink);min-width:32px;text-align:right;}
  .hint-btn{
    display:block;margin:14px auto 0;border:none;border-radius:16px;padding:10px 20px;font-weight:900;
    font-size:13px;color:#fff;background:linear-gradient(135deg,#FFC93C,#FB8C00);cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .hint-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .hint-btn:disabled{opacity:.6;cursor:default;}

  /* mind games: odd one out */
  .odd-options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px;max-width:640px;margin:0 auto;}
  .odd-option-card{
    border:4px solid transparent;background:#fff;border-radius:22px;padding:22px 10px;cursor:pointer;
    box-shadow:0 5px 12px rgba(60,30,80,.15);display:flex;flex-direction:column;align-items:center;gap:8px;
    min-height:clamp(140px,32vw,190px);justify-content:center;
  }
  .odd-option-card:active{transform:scale(.94);}
  .odd-emoji{font-size:clamp(56px,15vw,84px);}
  .odd-label{font-weight:800;font-size:clamp(13px,3.5vw,16px);color:var(--ink);text-align:center;}
  .odd-option-card.correct{border-color:#43A047;background:#E8F8EA;animation:pulseGreen .5s ease;}
  .odd-option-card.wrong{border-color:#E53935;background:#FDEAEA;animation:shake .45s ease;}

  /* mind games: balloon pop */
  .balloon-target-card{
    text-align:center;font-weight:900;font-size:16px;color:var(--ink);background:#fff;border-radius:16px;
    padding:10px 16px;max-width:320px;margin:0 auto 12px;box-shadow:0 5px 12px rgba(60,30,80,.15);
  }
  .balloon-target-emoji{font-size:22px;vertical-align:middle;}
  .balloon-field{
    position:relative;height:400px;overflow:hidden;border-radius:20px;
    background:linear-gradient(180deg,#BBDEFB,#E1F5FE);margin-bottom:6px;
  }
  .balloon{
    position:absolute;bottom:-110px;width:clamp(80px,20vw,112px);height:clamp(98px,24vw,136px);border:none;
    border-radius:50% 50% 45% 45% / 58% 58% 42% 42%;display:flex;align-items:center;justify-content:center;
    font-size:clamp(34px,9vw,48px);cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.2);will-change:transform;
    animation-name:balloonRise;animation-timing-function:linear;animation-fill-mode:forwards;
  }
  @keyframes balloonRise{ from{ transform:translateY(0); } to{ transform:translateY(-1000px); } }
  .balloon.popped{ animation-play-state:paused; transform:scale(1.5); opacity:0; transition:all .3s ease; pointer-events:none; }
  .balloon.popped-wrong{ animation-play-state:paused; filter:grayscale(.7); opacity:.5; }
  .balloon.correct-glow{ box-shadow:0 0 0 6px #43A047,0 4px 10px rgba(0,0,0,.2); }
  .balloon.hint-glow{ box-shadow:0 0 0 6px #FFD54F,0 4px 10px rgba(0,0,0,.2); animation-play-state:running; }

  /* mind games: shared number/letter tile display */
  .num-sequence{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
  .num-seq-tile{
    width:clamp(60px,15vw,86px);height:clamp(60px,15vw,86px);border-radius:16px;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:clamp(26px,7vw,38px);font-weight:900;
    color:var(--ink);box-shadow:0 5px 12px rgba(60,30,80,.15);
  }
  .num-seq-tile.blank{background:linear-gradient(135deg,#FFC93C,#FF8A3D);color:#fff;}
  .num-options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;max-width:600px;margin:0 auto;}
  .num-option-card{
    border:4px solid transparent;background:#fff;border-radius:22px;padding:18px 10px;cursor:pointer;
    box-shadow:0 5px 12px rgba(60,30,80,.15);min-height:clamp(110px,26vw,160px);display:flex;align-items:center;
    justify-content:center;font-size:clamp(32px,9vw,52px);font-weight:900;color:var(--ink);flex-wrap:wrap;
  }
  .num-option-card:active{transform:scale(.94);}
  .num-option-card.correct{border-color:#43A047;background:#E8F8EA;animation:pulseGreen .5s ease;}
  .num-option-card.wrong{border-color:#E53935;background:#FDEAEA;animation:shake .45s ease;}
  .num-big-display{font-size:clamp(70px,20vw,110px);font-weight:900;color:var(--ink);text-align:center;margin-bottom:6px;}
  .num-question-text{font-weight:800;font-size:clamp(14px,4vw,18px);color:var(--ink);text-align:center;margin-bottom:16px;}
  .num-equation{font-size:clamp(28px,8vw,42px);text-align:center;margin-bottom:6px;line-height:1.3;}
  .num-op{font-weight:900;color:var(--purple);margin:0 6px;}
  .num-crossed{opacity:.3;text-decoration:line-through;}

  /* color sorting */
  .color-sort-target{
    text-align:center;font-weight:900;font-size:18px;color:var(--ink);background:#fff;border-radius:16px;
    padding:12px 16px;max-width:320px;margin:0 auto 18px;box-shadow:0 5px 12px rgba(60,30,80,.15);
  }
  .color-sort-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:20px;max-width:620px;margin:0 auto;}
  .color-sort-blob{
    width:100%;aspect-ratio:1/1;border-radius:50%;border:none;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.2);
  }
  .color-sort-blob:active{transform:scale(.94);}
  .color-sort-blob.correct-pop{animation:pulseGreen .5s ease;box-shadow:0 0 0 8px #43A047,0 6px 16px rgba(0,0,0,.2);}
  .color-sort-blob.wrong-shake{animation:shake .45s ease;opacity:.5;}
  .color-sort-blob.correct-glow{box-shadow:0 0 0 8px #43A047,0 6px 16px rgba(0,0,0,.2);}
  .color-sort-blob.hint-glow{box-shadow:0 0 0 8px #FFD54F,0 6px 16px rgba(0,0,0,.2);}

  /* numbers learning */
  .skin-toggle-row{display:flex;gap:12px;justify-content:center;margin-bottom:16px;}
  .skin-toggle-btn{
    width:56px;height:56px;border-radius:50%;border:4px solid transparent;background:#fff;font-size:26px;cursor:pointer;
    box-shadow:0 4px 10px rgba(60,30,80,.15);
  }
  .skin-toggle-btn.active{border-color:var(--yellow);background:#FFF6E9;}
  .numlearn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;}
  .numlearn-card{
    background:var(--card);border-radius:20px;padding:14px 8px;text-align:center;cursor:pointer;
    box-shadow:0 5px 14px rgba(60,30,80,.14);border:3px solid transparent;
  }
  .numlearn-card:active{transform:scale(.94);}
  .numlearn-card.talking{animation:bounce .5s ease;border-color:var(--yellow);}
  .numlearn-objects{font-size:clamp(14px,4vw,22px);line-height:1.5;min-height:60px;word-break:break-word;margin-bottom:6px;}
  .numlearn-num{font-size:clamp(32px,9vw,46px);font-weight:900;color:var(--purple);}
  .trace-thumb-num{font-size:44px;font-weight:900;color:var(--ink);}
  .sound-bubble{
    text-align:center;font-weight:900;font-size:clamp(20px,6vw,28px);color:var(--ink);background:#fff;
    border-radius:20px;padding:16px 20px;max-width:340px;margin:0 auto 20px;box-shadow:0 5px 12px rgba(60,30,80,.15);
    letter-spacing:1px;
  }
  .roadmap-note{text-align:center;font-size:13px;color:#8a819c;font-weight:700;margin-top:14px;}

  /* mouse practice: fullscreen game overlay */
  .fsg-overlay{position:fixed;inset:0;z-index:600;background:#fff;display:flex;flex-direction:column;}
  .fsg-header{
    display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;
    background:linear-gradient(135deg,#F3EFFF,#FFF3E0);box-shadow:0 2px 8px rgba(0,0,0,.1);flex:none;
  }
  .fsg-exit{
    border:none;background:#fff;border-radius:14px;padding:10px 16px;font-weight:900;font-size:14px;
    cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.15);color:var(--ink);
  }
  .fsg-title{font-weight:900;font-size:clamp(15px,4vw,22px);color:var(--ink);text-align:center;flex:1;}
  .fsg-progress{font-weight:900;font-size:clamp(13px,3.5vw,18px);color:var(--purple);min-width:70px;text-align:right;}
  .fsg-body{flex:1;position:relative;overflow:hidden;}
  .fsg-stage{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#BBDEFB,#E1F5FE);}

  /* mouse practice: click the animal */
  .fsg-stage.animal-click-stage{background:linear-gradient(180deg,#C8E6C9,#FFF9C4);}
  .animal-click-item{
    position:absolute;width:clamp(70px,12vw,110px);height:clamp(70px,12vw,110px);border:none;background:#fff;
    border-radius:50%;font-size:clamp(38px,7vw,58px);display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 12px rgba(0,0,0,.2);cursor:pointer;
  }
  .animal-click-item:active{transform:scale(.9);}
  .animal-click-item.clicked-pop{animation:pulseGreen .5s ease;opacity:.25;pointer-events:none;}

  /* mouse practice: drag and drop */
  .fsg-stage.dragdrop-stage{background:linear-gradient(180deg,#E1F5FE,#FFF9C4);}
  .drag-item{
    position:absolute;top:30px;left:50%;transform:translate(-50%,0);width:clamp(90px,15vw,130px);height:clamp(90px,15vw,130px);
    border:none;background:#fff;border-radius:24px;font-size:clamp(52px,10vw,78px);display:flex;align-items:center;
    justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,.2);cursor:grab;touch-action:none;z-index:5;
  }
  .drag-item.dragging{cursor:grabbing;box-shadow:0 14px 26px rgba(0,0,0,.3);transform:translate(-50%,-50%) scale(1.12);z-index:20;}
  .drag-item.drag-success{animation:pulseGreen .5s ease;}
  .drop-zone{
    position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
    font-size:clamp(64px,12vw,96px);display:flex;align-items:center;justify-content:center;

  /* mouse practice: fish */
  .fsg-stage.fish-stage{background:linear-gradient(180deg,#4FC3F7,#0288D1);}

  @keyframes fishSwim{ from{ transform:translateX(-90px); } to{ transform:translateX(1200px); } }


  /* arcade: shared hud + target */
  .arcade-hud{
    display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:480px;margin:0 auto 14px;
    font-weight:900;font-size:16px;color:var(--ink);flex-wrap:wrap;
  }
  .arcade-target{
    text-align:center;font-weight:900;font-size:clamp(18px,5vw,24px);color:var(--ink);background:#fff;
    border-radius:18px;padding:14px 18px;max-width:420px;margin:0 auto 18px;box-shadow:0 5px 12px rgba(60,30,80,.15);
  }

  /* arcade: balloon pop stage */
  .balloon-stage{
    position:relative;height:400px;overflow:hidden;border-radius:20px;
    background:linear-gradient(180deg,#BBDEFB,#E1F5FE);margin-bottom:14px;
  }
  .balloon.hint{ box-shadow:0 0 0 6px #FFD54F,0 4px 10px rgba(0,0,0,.2); }

  /* arcade: letter hunt / number race tile grid */
  .hunt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:14px;max-width:560px;margin:0 auto 16px;}
  .hunt-tile{
    aspect-ratio:1/1;border:4px solid transparent;border-radius:18px;background:#fff;cursor:pointer;
    font-size:clamp(28px,8vw,40px);font-weight:900;color:var(--ink);box-shadow:0 5px 12px rgba(60,30,80,.15);
  }
  .hunt-tile:active{transform:scale(.94);}
  .hunt-tile:disabled{cursor:default;}
  .hunt-tile.hint{border-color:#FFD54F;box-shadow:0 0 0 6px #FFD54F,0 5px 12px rgba(60,30,80,.15);}
  .hunt-tile.correct{border-color:#43A047;background:#E8F8EA;animation:pulseGreen .5s ease;}
  .hunt-tile.wrong{border-color:#E53935;background:#FDEAEA;animation:shake .45s ease;}

  /* arcade: number race track */
  .race-track{
    position:relative;height:70px;background:linear-gradient(90deg,#D7CCC8,#BCAAA4);border-radius:35px;
    max-width:520px;margin:0 auto 18px;overflow:hidden;
  }
  .race-runner{
    position:absolute;top:50%;transform:translateY(-50%);font-size:38px;transition:left .5s ease;
  }
  .race-flag{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:32px;}

  /* arcade: sorting */
  .sort-item-card{
    text-align:center;background:#fff;border-radius:22px;padding:20px;max-width:260px;margin:0 auto 22px;
    box-shadow:0 6px 16px rgba(60,30,80,.15);
  }
  .sort-bins-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;max-width:560px;margin:0 auto;}
  .sort-bin{
    flex:1;min-width:150px;min-height:clamp(140px,32vw,190px);border:none;border-radius:22px;cursor:pointer;
    color:#fff;font-weight:900;font-size:clamp(15px,4vw,19px);box-shadow:0 6px 16px rgba(60,30,80,.2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:5px solid transparent;
  }
  .sort-bin:active{transform:scale(.96);}
  .sort-bin.hint{border-color:#FFD54F;}
  .sort-bin.correct{border-color:#43A047;animation:pulseGreen .5s ease;}
  .sort-bin.wrong{border-color:#E53935;animation:shake .45s ease;}

  /* count to 500 chart */
  .chart500-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:6px;}
  .chart500-cell{
    background:#fff;border:none;border-radius:8px;padding:8px 2px;text-align:center;font-weight:900;font-size:14px;
    cursor:pointer;box-shadow:0 2px 6px rgba(60,30,80,.1);
  }
  .chart500-cell:active{transform:scale(.9);}

  /* big tables poster */
  .bigtables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .bigtable-card{border-radius:18px;padding:12px 10px;box-shadow:0 6px 14px rgba(60,30,80,.15);}
  .bigtable-card h3{margin:0 0 8px;text-align:center;font-size:16px;color:#fff;font-weight:900;}
  .bigtable-row{
    background:rgba(255,255,255,.88);border-radius:8px;padding:4px 8px;margin-bottom:4px;font-weight:800;
    font-size:12.5px;text-align:center;cursor:pointer;color:var(--ink);border:none;width:100%;
  }
  .bigtable-row:active{transform:scale(.96);}

  /* summary */
  .summary{text-align:center;padding:30px 12px;}
  .summary .emoji-big{font-size:70px;display:block;margin-bottom:10px;}
  .summary h2{margin:0 0 6px;font-size:24px;}
  .summary p{color:#7c7290;font-weight:700;margin-bottom:22px;}
  .summary-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

  /* mascot */
  .mascot{
    position:fixed;left:14px;bottom:14px;z-index:40;display:flex;align-items:flex-end;gap:8px;max-width:88vw;
  }
  .mascot .face{
    width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#FFD54F,#FF8A3D);
    display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 10px rgba(0,0,0,.2);flex:none;
  }
  .mascot .bubble{
    background:#fff;border-radius:16px;padding:8px 12px;font-weight:700;font-size:12.5px;
    box-shadow:0 4px 12px rgba(60,30,80,.2);max-width:230px;
  }
  .mascot .bubble.pop{animation:bubblein .35s ease;}
  @keyframes bubblein{0%{transform:translateY(8px) scale(.9);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}

  /* confetti */
  .confetti-piece{
    position:fixed;top:-10px;width:9px;height:9px;border-radius:2px;z-index:60;pointer-events:none;
    animation:fall 1.1s ease-in forwards;
  }
  @keyframes fall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(90vh) rotate(400deg);opacity:0;}
  }

  /* big image preview */
  .big-preview-overlay{
    position:fixed;inset:0;background:rgba(58,50,71,.55);z-index:200;display:flex;
    align-items:center;justify-content:center;padding:20px;animation:previewFade .2s ease;
  }
  .big-preview-card{
    background:#fff;border-radius:32px;padding:34px 30px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35);
    max-width:460px;width:100%;animation:previewPop .35s cubic-bezier(.34,1.56,.64,1);position:relative;
  }
  .big-preview-card.story-card-mode{
    max-width:620px;width:92vw;text-align:left;padding:32px 28px 26px;
    max-height:88vh;overflow-y:auto;
  }
  .big-preview-content{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:clamp(180px,55vw,280px);}
  .big-preview-visual{display:flex;align-items:center;justify-content:center;line-height:1;margin-bottom:10px;min-height:clamp(180px,55vw,280px);}
  .big-preview-symbol{font-size:24px;font-weight:800;color:var(--purple);display:block;margin-bottom:2px;}
  .big-preview-label{font-size:30px;font-weight:900;color:var(--ink);word-break:break-word;}
  @keyframes previewFade{0%{opacity:0;}100%{opacity:1;}}
  @keyframes previewPop{0%{transform:scale(.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .preview-close{
    position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;border:none;
    background:#F0F0F0;color:#777;font-weight:900;cursor:pointer;font-size:15px;line-height:1;z-index:3;
  }
  .preview-close:active{transform:scale(.9);}
  .preview-arrow{
    position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;border:none;
    background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.18);font-size:22px;font-weight:900;cursor:pointer;
    color:var(--ink);z-index:3;
  }
  .preview-arrow-left{left:6px;}
  .preview-arrow-right{right:6px;}
  .preview-arrow:active{transform:translateY(-50%) scale(.88);}
  .story-emoji{font-size:clamp(48px,12vw,72px);text-align:center;margin-bottom:8px;}
  .story-title{font-size:clamp(20px,5.5vw,28px);font-weight:900;text-align:center;margin-bottom:14px;color:var(--ink);}
  .story-text{font-size:clamp(17px,4.2vw,21px);line-height:1.75;color:#4a4458;margin-bottom:16px;text-align:left;}
  .story-moral{background:#FFF3E0;border-radius:14px;padding:12px 16px;font-weight:800;font-size:clamp(14px,3.6vw,17px);color:#8a5a00;margin-bottom:14px;text-align:left;}
  .story-read-btn{display:block;margin:0 auto;}

  button{font-family:inherit;}
  button:focus-visible, .mod-card:focus-visible, .learn-card:focus-visible, .opt-card:focus-visible{
    outline:3px dashed #333;outline-offset:2px;
  }

  /* home dashboard */
  .dashboard-card{
    background:#fff;border-radius:24px;padding:18px 16px;margin-bottom:18px;
    box-shadow:0 8px 20px rgba(60,30,80,.15);max-width:600px;margin-left:auto;margin-right:auto;
  }
  .dash-greeting{font-size:17px;font-weight:900;text-align:center;margin-bottom:12px;color:var(--ink);}
  .dash-name-form{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;}
  .dash-name-input{
    border:3px solid #FFD54F;border-radius:14px;padding:10px 14px;font-size:16px;font-weight:700;
    text-align:center;max-width:180px;font-family:inherit;
  }
  .dash-stats-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
  .dash-stat-chip{
    background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:16px;padding:8px 14px;
    font-weight:900;font-size:13px;color:var(--ink);
  }
  .dash-actions-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
  .dash-continue-btn, .dash-gift-btn{
    border:none;cursor:pointer;border-radius:16px;padding:12px 18px;font-weight:900;color:#fff;
    box-shadow:0 5px 0 rgba(0,0,0,.15);font-size:13px;
  }
  .dash-continue-btn:active,.dash-gift-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .dash-recent{text-align:center;font-size:12px;font-weight:700;color:#8a819c;margin-bottom:8px;}
  .badge-shelf{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .badge-chip{
    width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:24px;background:linear-gradient(135deg,#FFD54F,#FFA726);box-shadow:0 4px 10px rgba(0,0,0,.15);
  }
  .badge-chip.locked{background:#E0E0E0;filter:grayscale(1);opacity:.6;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }

  @media (max-width:420px){
    .options-grid{grid-template-columns:1fr 1fr;gap:10px;}
    .choice-btn{min-width:130px;padding:18px 16px;}
  }

  /* ===================== LIVING SCENE BACKGROUND ===================== */
  .scene-sky{
    position:fixed;inset:0;z-index:-6;
    background:linear-gradient(180deg,#6EC3F4 0%,#9ADCF7 20%,#CDEFFB 42%,#FFF6E9 78%,#FFEAD1 100%);
  }
  .scene-sun{
    position:fixed;top:5%;right:9%;width:110px;height:110px;border-radius:50%;z-index:-6;
    background:radial-gradient(circle,#FFFDE7 0%,#FFF59D 35%,#FFD54F 60%,rgba(255,213,79,0) 76%);
    filter:blur(.5px);animation:sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse{0%,100%{opacity:.9;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}

  .scene-clouds{position:fixed;inset:0;z-index:-5;overflow:hidden;pointer-events:none;}
  .scene-cloud{position:absolute;opacity:.85;filter:drop-shadow(0 4px 4px rgba(0,0,0,.06));}
  .scene-cloud svg{display:block;}
  .scene-cloud.c1{top:7%;left:-22%;animation:cloudDrift 60s linear infinite;}
  .scene-cloud.c2{top:16%;left:-22%;animation:cloudDrift 78s linear infinite 12s;}
  .scene-cloud.c3{top:3%;left:-22%;animation:cloudDrift 92s linear infinite 30s;}
  .scene-cloud.c4{top:22%;left:-22%;animation:cloudDrift 70s linear infinite 45s;}
  @keyframes cloudDrift{0%{transform:translateX(0);}100%{transform:translateX(145vw);}}

  .scene-birds{position:fixed;inset:0;z-index:-4;overflow:hidden;pointer-events:none;}
  .bird-wrap{position:absolute;left:-8%;}
  .bird-wrap.b1{top:9%;animation:flyAcross 16s linear infinite;}
  .bird-wrap.b2{top:17%;animation:flyAcross 22s linear infinite 5s;}
  .bird-wrap.b3{top:6%;animation:flyAcross 19s linear infinite 10s;}
  .bird-wrap.b4{top:26%;animation:flyAcross 25s linear infinite 2s;}
  @keyframes flyAcross{0%{transform:translateX(0) translateY(0);}50%{transform:translateX(60vw) translateY(-14px);}100%{transform:translateX(125vw) translateY(0);}}
  .bird-svg{width:38px;height:auto;display:block;animation:flap .5s ease-in-out infinite alternate;transform-origin:center;}
  @keyframes flap{0%{transform:scaleY(1);}100%{transform:scaleY(.5);}}


  .scene-flowers{
    position:fixed;bottom:0;left:0;right:0;z-index:-2;pointer-events:none;
    font-size:24px;text-align:center;letter-spacing:16px;opacity:.95;white-space:nowrap;overflow:hidden;
    padding-bottom:2px;line-height:1;
  }

  .scene-kid{
    position:fixed;top:0;bottom:0;height:100vh;z-index:-2;
    width:clamp(90px, calc((100vw - 940px)/2), 420px);
    object-fit:cover;object-position:top center;
    opacity:.22;pointer-events:none;display:none;
    -webkit-mask-image:linear-gradient(to right, black 0%, black 55%, transparent 100%);
    mask-image:linear-gradient(to right, black 0%, black 55%, transparent 100%);
  }
  .scene-kid.scene-girl{left:0;}
  .scene-kid.scene-boy{
    right:0;
    -webkit-mask-image:linear-gradient(to left, black 0%, black 55%, transparent 100%);
    mask-image:linear-gradient(to left, black 0%, black 55%, transparent 100%);
  }

  @media (min-width:1100px){
    .scene-kid{display:block;}
  }

  @media (prefers-reduced-motion: reduce){
    .scene-cloud,.bird-wrap,.bird-svg,.scene-sun{animation:none !important;}
  }

  /* screen transition */
  #screen.screen-fade-in{animation:screenFadeIn .45s ease;}
  @keyframes screenFadeIn{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>

<div class="scene-sun"></div>

  <div class="scene-cloud c1"><svg width="120" height="50" viewBox="0 0 120 50"><ellipse cx="30" cy="32" rx="26" ry="16" fill="#fff"/><ellipse cx="60" cy="22" rx="32" ry="20" fill="#fff"/><ellipse cx="90" cy="32" rx="24" ry="15" fill="#fff"/></svg></div>
  <div class="scene-cloud c2"><svg width="90" height="40" viewBox="0 0 120 50"><ellipse cx="30" cy="32" rx="26" ry="16" fill="#fff"/><ellipse cx="60" cy="22" rx="32" ry="20" fill="#fff"/><ellipse cx="90" cy="32" rx="24" ry="15" fill="#fff"/></svg></div>
  <div class="scene-cloud c3"><svg width="150" height="60" viewBox="0 0 120 50"><ellipse cx="30" cy="32" rx="26" ry="16" fill="#fff"/><ellipse cx="60" cy="22" rx="32" ry="20" fill="#fff"/><ellipse cx="90" cy="32" rx="24" ry="15" fill="#fff"/></svg></div>
  <div class="scene-cloud c4"><svg width="100" height="42" viewBox="0 0 120 50"><ellipse cx="30" cy="32" rx="26" ry="16" fill="#fff"/><ellipse cx="60" cy="22" rx="32" ry="20" fill="#fff"/><ellipse cx="90" cy="32" rx="24" ry="15" fill="#fff"/></svg></div>

function $(sel){return document.querySelector(sel);}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function getModule(id){return MODULES.find(m=>m.id===id);}

function speak(text, lang){
  if(!('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'en-US';
    u.rate = 0.85;
    u.pitch = 1.15;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function playTone(freq,duration,type){
  try{
    const ctx = window._actx || (window._actx = new (window.AudioContext||window.webkitAudioContext)());
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type||'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+(duration/1000));
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+(duration/1000));
  }catch(e){}
}
function playCorrect(){ playTone(880,140); setTimeout(()=>playTone(1175,220),130); }
function playWrong(){ playTone(190,320,'sawtooth'); }
function playClick(){ playTone(700,90); }

let previewState = { items:[], index:0, renderFn:null, speakFn:null, onRenderFn:null };

function openBigPreview(items, index, opts){
  closeBigPreview();
  opts = opts || {};
  previewState = { items:items, index:index, renderFn:opts.renderFn, speakFn:opts.speakFn||null, onRenderFn:opts.onRenderFn||null };
  const overlay = document.createElement('div');
  overlay.className = 'big-preview-overlay';
  overlay.id = 'bigPreviewOverlay';
  overlay.innerHTML = '<div class="big-preview-card'+(opts.cardClass?(' '+opts.cardClass):'')+'">'
    + '<button class="preview-close" id="previewClose" aria-label="Close">✕</button>'
    + (items.length>1 ? '<button class="preview-arrow preview-arrow-left" id="previewPrev" aria-label="Previous">‹</button>' : '')
    + '<div class="big-preview-content" id="bigPreviewContent"></div>'
    + (items.length>1 ? '<button class="preview-arrow preview-arrow-right" id="previewNext" aria-label="Next">›</button>' : '')
    + '</div>';
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeBigPreview(); });
  document.body.appendChild(overlay);
  $('#previewClose').addEventListener('click', closeBigPreview);
  const prevBtn = $('#previewPrev'); if(prevBtn) prevBtn.addEventListener('click', ()=>navigatePreview(-1));
  const nextBtn = $('#previewNext'); if(nextBtn) nextBtn.addEventListener('click', ()=>navigatePreview(1));
  document.addEventListener('keydown', handlePreviewKeydown);
  renderPreviewContent();
}

function renderPreviewContent(){
  const el = $('#bigPreviewContent');
  if(!el) return;
  const item = previewState.items[previewState.index];
  el.innerHTML = previewState.renderFn(item);
  if(previewState.onRenderFn) previewState.onRenderFn(item);
}

function navigatePreview(delta){
  const n = previewState.items.length;
  if(n===0) return;
  previewState.index = (previewState.index + delta + n) % n;
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  renderPreviewContent();
  playClick();
  if(previewState.speakFn) previewState.speakFn(previewState.items[previewState.index]);
}

function handlePreviewKeydown(e){
  if(e.key==='ArrowLeft'){ e.preventDefault(); navigatePreview(-1); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); navigatePreview(1); }
  else if(e.key==='Escape'){ closeBigPreview(); }
}

function closeBigPreview(){
  const overlay = $('#bigPreviewOverlay');
  if(overlay) overlay.remove();
  document.removeEventListener('keydown', handlePreviewKeydown);
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
}

function shapeSVG(type,color,size){
  size = size||70;
  let inner='';
  switch(type){
    case 'circle': inner='<circle cx="50" cy="50" r="44" fill="'+color+'"/>'; break;
    case 'square': inner='<rect x="10" y="10" width="80" height="80" rx="12" fill="'+color+'"/>'; break;
    case 'triangle': inner='<polygon points="50,8 92,90 8,90" fill="'+color+'"/>'; break;
    case 'rectangle': inner='<rect x="4" y="25" width="92" height="50" rx="10" fill="'+color+'"/>'; break;
    case 'star': inner='<polygon points="50,4 61,37 96,37 68,58 79,92 50,71 21,92 32,58 4,37 39,37" fill="'+color+'"/>'; break;
    case 'heart': inner='<path d="M50,90 C15,65 2,42 2,24 C2,8 16,-2 32,2 C42,4 48,12 50,20 C52,12 58,4 68,2 C84,-2 98,8 98,24 C98,42 85,65 50,90 Z" fill="'+color+'"/>'; break;
    case 'oval': inner='<ellipse cx="50" cy="50" rx="46" ry="30" fill="'+color+'"/>'; break;
    case 'diamond': inner='<polygon points="50,4 94,50 50,96 6,50" fill="'+color+'"/>'; break;
    case 'hexagon': inner='<polygon points="25,6 75,6 98,50 75,94 25,94 2,50" fill="'+color+'"/>'; break;
  }
  return '<svg viewBox="0 0 100 100" width="'+size+'" height="'+size+'" aria-hidden="true">'+inner+'</svg>';
}

function itemVisual(module,item,size){
  size = size || 64;
  if(item.shape) return shapeSVG(item.shape,item.hex||'#888',size);
  if(module.visual==='color'){
    const border = item.hex.toUpperCase()==='#FFFFFF' ? 'border:4px solid #ddd;' : '';
    return '<div class="swatch" style="width:'+size+'px;height:'+size+'px;'+border+'background:'+item.hex+';"></div>';
  }
  if(module.visual==='stars'){
    const scale = size/64;
    const fs = (item.n>6 ? 16 : 22) * scale;
    return '<div class="stars-count" style="font-size:'+fs+'px;max-width:'+(size*1.9)+'px;">'+'⭐'.repeat(item.n)+'</div>';
  }
  return '<div class="emoji" style="font-size:'+size+'px">'+(item.emoji||'❔')+'</div>';
}

  {id:'coins10', name:'Coin Collector', icon:'🪙', test:function(){ return profile.coins>=10; }},
  {id:'streak5', name:'On Fire', icon:'🔥', test:function(){ return profile.bestStreak>=5; }}
];

function checkBadges(){
  BADGE_DEFS.forEach(function(b){
    if(profile.badges.indexOf(b.id)===-1 && b.test()){
      profile.badges.push(b.id);
      showBadgePopup(b);
    }
  });
}

function showBadgePopup(badge){
  confettiBurst(); playCorrect();
  mascotSay('New badge unlocked: '+badge.name+'! '+badge.icon);
  const overlay = document.createElement('div');
  overlay.className='big-preview-overlay';
  overlay.innerHTML = '<div class="big-preview-card"><div class="big-preview-visual" style="font-size:80px;">'+badge.icon+'</div><div class="big-preview-label">Badge Unlocked!<br>'+badge.name+'</div></div>';
  overlay.addEventListener('click', function(){ overlay.remove(); });
  document.body.appendChild(overlay);
  setTimeout(function(){ if(overlay.parentNode) overlay.remove(); }, 2200);
}

function recordActivityComplete(label, wasPerfect){
  profile.totalActivities++;
  profile.coins += 1;
  profile.recentActivity = label;
  if(wasPerfect) profile.hadPerfect = true;
  checkBadges();
}

function claimDailyGift(){
  if(profile.giftClaimed) return;
  profile.giftClaimed = true;
  profile.coins += 5;
  addStar(); addStar();
  confettiBurst(); playCorrect();
  mascotSay('Here is your gift! Plus 5 coins and 2 stars! 🎁');
  renderMenu();
}

function greetingEmoji(){
  const h = new Date().getHours();
  return h<12 ? '🌅' : (h<17 ? '🌞' : '🌙');
}
function greetingPhrase(){
  const h = new Date().getHours();
  const tod = h<12 ? 'Good Morning' : (h<17 ? 'Good Afternoon' : 'Good Evening');
  const nm = profile.name || 'Friend';
  return tod+', '+nm+'! Ready to learn today?';
}

function submitProfileName(){
  const el = $('#nameInput');
  const val = el ? el.value.replace(/[^a-zA-Z ]/g,'').trim().slice(0,16) : '';
  profile.name = val || 'Friend';
  playClick();
  renderMenu();
}

function renderDashboardCard(){
  let html = '<div class="dashboard-card">';
  if(!profile.name){
    html += '<div class="dash-greeting">Hi there! What is your name?</div>';
    html += '<div class="dash-name-form">'
          + '<input type="text" id="nameInput" class="dash-name-input" placeholder="Your name" maxlength="16" />'
          + '<button class="choice-btn" id="nameSubmitBtn" style="background:linear-gradient(135deg,#FFC93C,#FF8A3D);padding:10px 18px;"><span class="cicon">👋</span>Start!</button>'
          + '</div>';
  } else {
    html += '<div class="dash-greeting">'+greetingEmoji()+' '+greetingPhrase()+'</div>';
    html += '<div class="dash-stats-row">';
    html += '<div class="dash-stat-chip">🔥 Streak: '+profile.streak+'</div>';
    html += '<div class="dash-stat-chip">🪙 Coins: '+profile.coins+'</div>';
    html += '<div class="dash-stat-chip">⭐ Stars: '+stars+'</div>';
    html += '</div>';
    html += '<div class="dash-actions-row">';
    if(profile.lastModuleId && getModule(profile.lastModuleId)){
      html += '<button class="dash-continue-btn" id="continueBtn" style="background:linear-gradient(135deg,#29B6F6,#1E88E5);">▶ Continue: '+profile.lastModuleTitle+'</button>';
    }
    if(!profile.giftClaimed){
      html += '<button class="dash-gift-btn" id="giftBtn" style="background:linear-gradient(135deg,#EC407A,#8E24AA);">🎁 Open Gift</button>';
    }
    html += '</div>';
    if(profile.recentActivity){
      html += '<div class="dash-recent">✅ Recently completed: '+profile.recentActivity+'</div>';
    }
    html += '<div class="badge-shelf">';
    BADGE_DEFS.forEach(function(b){
      const unlocked = profile.badges.indexOf(b.id)!==-1;
      html += '<div class="badge-chip'+(unlocked?'':' locked')+'" title="'+b.name+'">'+(unlocked?b.icon:'🔒')+'</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function bindDashboardEvents(){
  const nameBtn = $('#nameSubmitBtn');
  if(nameBtn) nameBtn.addEventListener('click', submitProfileName);
  const nameInputEl = $('#nameInput');
  if(nameInputEl) nameInputEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ submitProfileName(); } });
  const contBtn = $('#continueBtn');
  if(contBtn) contBtn.addEventListener('click', function(){ playClick(); openModule(profile.lastModuleId); });
  const giftBtn = $('#giftBtn');
  if(giftBtn) giftBtn.addEventListener('click', claimDailyGift);
}

/* ---------------- RENDER: MODULE HOME ---------------- */
function openModule(id){
  closeBigPreview();
  state.moduleId = id;
  const m = getModule(id);
  profile.lastModuleId = id;
  profile.lastModuleTitle = m.title;
  if(profile.modulesVisited.indexOf(id)===-1){ profile.modulesVisited.push(id); checkBadges(); }

  if(m.type==='tables'){ renderTablesHome(m); return; }
  if(m.type==='letterforms'){ renderLetterFormsHome(m); return; }
  if(m.type==='coloring'){ renderColoringGallery(m); return; }
  if(m.type==='magic'){ renderMagicHome(m); return; }
  if(m.type==='music'){ renderMusicHome(m); return; }
  if(m.type==='mindgames'){ renderMindGamesHome(m); return; }
  if(m.type==='numlearn'){ renderNumbersLearnHome(m); return; }
  if(m.type==='animalgames'){ renderAnimalGamesHome(m); return; }
  if(m.type==='langcorner'){ renderLangCornerHome(m); return; }
  if(m.type==='mousepractice'){ renderMousePracticeHome(m); return; }
  if(m.type==='chart500'){ renderChart500(m); return; }
  if(m.type==='bigtables'){ renderBigTables(m); return; }
  if(m.type==='stories'){ renderStoryGallery(m); return; }
  if(m.type==='arcade'){ renderArcadeHome(m); return; }

  state.screen='moduleHome';
  $('#screenTitle').textContent = m.title;
  $('#screenSub').textContent = m.subtitle;
  mascotSay("Want to Learn first, or jump into Play?");
  let html = '<div class="module-home">';
  html += '<button class="back-link" id="backToMenu">⬅ Back to Garden</button>';
  html += '<div class="module-banner" style="background:linear-gradient(150deg,'+m.theme[0]+','+m.theme[1]+')">'
        + '<span class="big-icon">'+m.icon+'</span><h2>'+m.title+'</h2><p>'+m.subtitle+'</p></div>';
  html += '<div class="choice-row">';
  html += '<button class="choice-btn" id="btnLearn" style="background:linear-gradient(135deg,'+m.theme[0]+','+m.theme[1]+')"><span class="cicon">📖</span>Learn</button>';
  html += '<button class="choice-btn" id="btnPlay" style="background:linear-gradient(135deg,'+m.theme[1]+','+m.theme[0]+')"><span class="cicon">🎮</span>Play Quiz</button>';
  html += '</div></div>';
  $('#screen').innerHTML = html;
  $('#backToMenu').addEventListener('click',()=>{playClick();renderMenu();});
  $('#btnLearn').addEventListener('click',()=>{
    playClick();
    if(m.type==='count') renderCountLearn(m);
    else if(m.type==='hundred') renderHundredLearn(m);
    else renderLearn(m);
  });
  $('#btnPlay').addEventListener('click',()=>{
    playClick();
    if(m.type==='count') startCountQuiz(m);
    else if(m.type==='hundred') startHundredQuiz(m);
    else startQuiz(m);
  });
}

/* ---------------- RENDER: LEARN ---------------- */
function renderLearn(m){
  state.screen='learn';
  $('#screenTitle').textContent = m.title+' — Learn';
  mascotSay(LEARN_MSGS[randInt(0,LEARN_MSGS.length-1)]);
  let html = '<button class="back-link" id="backToHome">⬅ Back</button><div class="learn-grid">';
  m.items.forEach((item,i)=>{
    html += '<div class="learn-card" tabindex="0" data-idx="'+i+'">'
      + '<div class="visual">'+itemVisual(m,item,110)+'</div>'
      + '<div class="card-label">'+(item.symbol?'<span class="card-symbol">'+item.symbol+'</span><br>':'')+item.label+'</div>'
      + '</div>';
  });
  html += '</div>';
  $('#screen').innerHTML = html;
  $('#backToHome').addEventListener('click',()=>{playClick(); openModule(m.id);});
  document.querySelectorAll('.learn-card').forEach(card=>{
    const say = ()=>{
      const idx = parseInt(card.dataset.idx,10);
      const item = m.items[idx];
      card.classList.remove('talking'); void card.offsetWidth; card.classList.add('talking');
      playClick();
      openBigPreview(m.items, idx, {
        renderFn: function(it){
          return '<div class="big-preview-visual">'+itemVisual(m,it,260)+'</div>'
            + (it.symbol ? '<span class="big-preview-symbol">'+it.symbol+'</span>' : '')

/* ---------------- QUIZ (flashcard modules) ---------------- */
function startQuiz(m){
  state.screen='quiz'; state.mode='quiz';
  const count = Math.min(8, m.items.length);
  state.queue = shuffle(m.items).slice(0,count);
  state.index = 0; state.score = 0;
  nextQuestion(m);
}

function nextQuestion(m){
  if(state.index >= state.queue.length){ renderSummary(m); return; }
  const correct = state.queue[state.index];
  const pool = shuffle(m.items.filter(it=>it!==correct)).slice(0,3);
  const options = shuffle([correct,...pool]);
  state.current = { correct, options };
  renderQuizQuestion(m);
}

function renderQuizQuestion(m){
  const {correct, options} = state.current;
  $('#screenTitle').textContent = m.title+' — Quiz';
  let promptInner, askText, lang=m.lang;
  if(m.quizMode==='letterFromPicture'){
    promptInner = itemVisual(m, correct, 150);
    askText = 'Which letter is this?';
    speak(correct.label, lang);
  } else if(m.quizMode==='pictureFromWord'){
    promptInner = '<div class="prompt-word">'+correct.label+'</div>';
    askText = 'Find the matching picture!';
    speak(correct.label, lang);
  } else {
    promptInner = '<div class="prompt-word">'+(correct.emoji?correct.emoji+' ':'')+correct.label+'</div>';
    askText = 'Find the same one!';
    speak(correct.label, lang);
  }

  let html = '<div class="quiz-top">';
  html += '<button class="back-link" id="backToHome">⬅ Exit Quiz</button>';
  html += '<div class="quiz-progress">Question '+(state.index+1)+' of '+state.queue.length+' &nbsp;•&nbsp; ⭐ '+state.score+'</div>';
  html += '<div class="prompt-card" style="background:linear-gradient(150deg,'+m.theme[0]+','+m.theme[1]+')">';
  html += '<div class="ask">'+askText+'</div>'+promptInner;
  html += '<button class="repeat-btn" id="repeatBtn">🔊 Repeat</button></div></div>';
  html += '<div class="options-grid">';
  options.forEach((opt,i)=>{
    let inner;
    if(m.quizMode==='letterFromPicture') inner = '<div class="opt-letter">'+opt.symbol+'</div>';
    else if(m.quizMode==='pictureFromWord') inner = itemVisual(m,opt,105);
    else inner = '<div class="opt-text">'+(opt.emoji?opt.emoji+' ':'')+opt.label+'</div>';
    html += '<div class="opt-card" data-i="'+i+'">'+inner+'</div>';
  });
  html += '</div>';
  $('#screen').innerHTML = html;

  $('#backToHome').addEventListener('click',()=>{playClick(); openModule(m.id);});
  $('#repeatBtn').addEventListener('click',()=>{ speak(correct.label, lang); playClick(); });
  document.querySelectorAll('.opt-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const chosen = options[card.dataset.i];
      handleAnswer(m, chosen===correct, card);
    });
  });
}

function handleAnswer(m, isCorrect, card){
  document.querySelectorAll('.opt-card').forEach(c=>c.style.pointerEvents='none');
  if(isCorrect){
    card.classList.add('correct');
    playCorrect(); confettiBurst(); addStar();
    state.score++;
    profile.streak++;
    if(profile.streak>profile.bestStreak) profile.bestStreak=profile.streak;
    checkBadges();
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
    setTimeout(()=>{ state.index++; nextQuestion(m); }, 900);
  } else {
    card.classList.add('wrong');
    playWrong();
    profile.streak = 0;
    mascotSay(WRONG_MSGS[randInt(0,WRONG_MSGS.length-1)]);
    const correctIdx = state.current.options.indexOf(state.current.correct);
    setTimeout(()=>{
      const cards = document.querySelectorAll('.opt-card');
      if(cards[correctIdx]) cards[correctIdx].classList.add('correct');
    }, 500);
    setTimeout(()=>{ state.index++; nextQuestion(m); }, 1700);
  }
}

function pickDistractors(correct, spread){
  const set = new Set();
  let guard = 0;
  while(set.size<3 && guard<200){
    guard++;
    const delta = randInt(-spread,spread);
    const val = correct+delta;
    if(val>0 && val!==correct) set.add(val);
  }
  return [...set];
}

  state.screen='lfGrid';
  const titles = {upper:'Uppercase A-Z', lower:'lowercase a-z', cursive:'Cursive Style'};
  $('#screenTitle').textContent = titles[style];
  mascotSay('Tap a letter to hear its name!');
  let html = '<button class="back-link" id="backToHome">⬅ Back</button><div class="learn-grid">';
  ALPHABET_LIST.forEach(letter=>{
    let display, cls;
    if(style==='upper'){ display=letter; cls='lf-big'; }
    else if(style==='lower'){ display=letter.toLowerCase(); cls='lf-big'; }
    else { display=letter+letter.toLowerCase(); cls='lf-cursive'; }
    html += '<div class="learn-card" tabindex="0" data-letter="'+letter+'" data-cls="'+cls+'" data-display="'+display+'">'
      + '<div class="visual"><span class="'+cls+'">'+display+'</span></div>'
      + '<div class="card-label">'+letter+'</div></div>';
  });
  html += '</div>';
  $('#screen').innerHTML = html;
  $('#backToHome').addEventListener('click',()=>{playClick(); renderLetterFormsHome(m);});
  document.querySelectorAll('.learn-card').forEach(card=>{
    const say = ()=>{
      const letter = card.dataset.letter;
      const idx = ALPHABET_LIST.indexOf(letter);
      card.classList.remove('talking'); void card.offsetWidth; card.classList.add('talking');
      playClick();
      openBigPreview(ALPHABET_LIST, idx, {
        renderFn: function(l){
          let disp, cls;
          if(style==='upper'){ disp=l; cls='lf-big'; }
          else if(style==='lower'){ disp=l.toLowerCase(); cls='lf-big'; }
          else { disp=l+l.toLowerCase(); cls='lf-cursive'; }
          return '<div class="big-preview-visual"><span class="'+cls+'" style="font-size:130px;">'+disp+'</span></div>';
        },
        speakFn: function(l){ speak(l,'en-US'); }
      });
    };
    card.addEventListener('click',say);
    card.addEventListener('keydown',(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); say(); }});
  });
}

function startLetterFormsQuiz(m){
  state.screen='quiz'; state.mode='letterforms';
  state.queue = shuffle(ALPHABET_LIST).slice(0,8);
  state.index=0; state.score=0;
  nextLetterFormsQuestion(m);
}

function nextLetterFormsQuestion(m){
  if(state.index >= state.queue.length){ renderLetterFormsSummary(m); return; }
  const letter = state.queue[state.index];
  const correct = letter.toLowerCase();
  const pool = shuffle(ALPHABET_LIST.filter(l=>l!==letter)).slice(0,3).map(l=>l.toLowerCase());
  const options = shuffle([correct, ...pool]);
  state.current = { letter, correct, options };
  renderLetterFormsQuestion(m);
}

function renderLetterFormsQuestion(m){
  const {letter, correct, options} = state.current;
  $('#screenTitle').textContent = 'ABC Formats — Quiz';
  speak(letter, 'en-US');
  let html = '<div class="quiz-top">';
  html += '<button class="back-link" id="backToHome">⬅ Exit Quiz</button>';
  html += '<div class="quiz-progress">Question '+(state.index+1)+' of '+state.queue.length+' &nbsp;•&nbsp; ⭐ '+state.score+'</div>';
  html += '<div class="prompt-card" style="background:linear-gradient(150deg,'+m.theme[0]+','+m.theme[1]+')">';
  html += '<div class="ask">Find the matching small letter!</div><div class="prompt-word">'+letter+'</div>';
  html += '<button class="repeat-btn" id="repeatBtn">🔊 Repeat</button></div></div>';
  html += '<div class="options-grid">';
  options.forEach((opt,i)=>{ html += '<div class="opt-card" data-i="'+i+'"><div class="opt-letter">'+opt+'</div></div>'; });
  html += '</div>';
  $('#screen').innerHTML = html;
  $('#backToHome').addEventListener('click',()=>{playClick(); renderLetterFormsHome(m);});
  $('#repeatBtn').addEventListener('click',()=>{ speak(letter,'en-US'); playClick(); });
  document.querySelectorAll('.opt-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const chosen = options[card.dataset.i];
      handleLetterFormsAnswer(m, chosen===correct, card);
    });
  });
}

function handleLetterFormsAnswer(m, isCorrect, card){
  document.querySelectorAll('.opt-card').forEach(c=>c.style.pointerEvents='none');
  if(isCorrect){
    card.classList.add('correct'); playCorrect(); confettiBurst(); addStar(); state.score++;
    mascotSay(CORRECT_MSGS[randInt(0,CORRECT_MSGS.length-1)]);
    setTimeout(()=>{ state.index++; nextLetterFormsQuestion(m); }, 900);
  } else {
    card.classList.add('wrong'); playWrong();
    mascotSay(WRONG_MSGS[randInt(0,WRONG_MSGS.length-1)]);
    const correctIdx = state.current.options.indexOf(state.current.correct);
    setTimeout(()=>{ const cards=document.querySelectorAll('.opt-card'); if(cards[correctIdx]) cards[correctIdx].classList.add('correct'); }, 500);
    setTimeout(()=>{ state.index++; nextLetterFormsQuestion(m); }, 1700);
  }
}

function renderLetterFormsSummary(m){
  state.screen='summary';
  const total = state.queue.length; const great = state.score===total;
  recordActivityComplete('ABC Formats Quiz', great);
  $('#screenTitle').textContent = 'ABC Formats — Great Job!';
  mascotSay(great ? "Wow, perfect score! You're a champion! 🏆" : "Nice work! Let's keep practicing! 🦊");
  let html = '<div class="summary"><span class="emoji-big">'+(great?'🏆':'🎉')+'</span>';
  html += '<h2>You scored '+state.score+' / '+total+' ⭐</h2>';
  html += '<p>'+(great?'Perfect! You know your letters!':'Great effort — try again to get more stars!')+'</p>';
  html += '<div class="summary-actions">';
  html += '<button class="choice-btn" id="playAgain" style="background:linear-gradient(135deg,'+m.theme[0]+','+m.theme[1]+')"><span class="cicon">🔁</span>Play Again</button>';
  html += '<button class="choice-btn" id="toHome" style="background:linear-gradient(135deg,'+m.theme[1]+','+m.theme[0]+')"><span class="cicon">🏡</span>Module Home</button>';
  html += '<button class="choice-btn" id="toMenu" style="background:linear-gradient(135deg,#9575CD,#29B6F6)"><span class="cicon">🌈</span>Garden</button>';
  html += '</div></div>';
  $('#screen').innerHTML = html;
  $('#playAgain').addEventListener('click',()=>{ playClick(); startLetterFormsQuiz(m); });
  $('#toHome').addEventListener('click',()=>{ playClick(); renderLetterFormsHome(m); });
  $('#toMenu').addEventListener('click',()=>{ playClick(); renderMenu(); });
  if(great) confettiBurst();
}

/* ---------------- COLORING: SHAPE HELPERS ---------------- */
function arcDome(cx,cy,r){ return 'M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy+' Z'; }
function arcOpen(cx,cy,r){ return 'M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy; }
function dots(points,r,fill){ return points.map(function(p){ return {type:'circle',cx:p[0],cy:p[1],r:r,fill:fill,sw:3}; }); }
function petals(cx,cy,dist,rx,ry,count,fill){
  const arr=[];
  for(let i=0;i<count;i++){
    const angle=(360/count)*i;
    arr.push({type:'ellipse',cx:cx,cy:cy-dist,rx:rx,ry:ry,fill:fill,transform:'rotate('+angle+' '+cx+' '+cy+')'});
  }
  return arr;
}
function rays(cx,cy,r1,r2,count,sw){
  const arr=[];
  for(let i=0;i<count;i++){
    const angle=(360/count)*i;
    const rad=angle*Math.PI/180;
    arr.push({type:'line',x1:cx+r1*Math.cos(rad),y1:cy+r1*Math.sin(rad),x2:cx+r2*Math.cos(rad),y2:cy+r2*Math.sin(rad),sw:sw||9});
  }
  return arr;
}

function renderShapesSVG(shapes, colored){
  let inner='';
  shapes.forEach(function(s){
    const isLine = s.type==='line' || s.area===false;
    const fillColor = isLine ? 'none' : (colored ? (s.fill||'#FDD835') : 'none');
    const strokeColor = (isLine && colored && s.fill) ? s.fill : '#3A3247';
    const fillAttr = 'fill="'+fillColor+'"';
    const strokeAttr = 'stroke="'+strokeColor+'" stroke-width="'+(s.sw||5)+'" stroke-linejoin="round" stroke-linecap="round"';
    const tf = s.transform ? (' transform="'+s.transform+'"') : '';
    if(s.type==='circle') inner += '<circle cx="'+s.cx+'" cy="'+s.cy+'" r="'+s.r+'" '+fillAttr+' '+strokeAttr+tf+'/>';
    else if(s.type==='ellipse') inner += '<ellipse cx="'+s.cx+'" cy="'+s.cy+'" rx="'+s.rx+'" ry="'+s.ry+'" '+fillAttr+' '+strokeAttr+tf+'/>';
    else if(s.type==='rect') inner += '<rect x="'+s.x+'" y="'+s.y+'" width="'+s.width+'" height="'+s.height+'" rx="'+(s.rx2!==undefined?s.rx2:6)+'" '+fillAttr+' '+strokeAttr+tf+'/>';
    else if(s.type==='polygon') inner += '<polygon points="'+s.points+'" '+fillAttr+' '+strokeAttr+tf+'/>';
    else if(s.type==='path') inner += '<path d="'+s.d+'" '+fillAttr+' '+strokeAttr+tf+'/>';
    else if(s.type==='line') inner += '<line x1="'+s.x1+'" y1="'+s.y1+'" x2="'+s.x2+'" y2="'+s.y2+'" '+strokeAttr+tf+'/>';
  });
  return '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">'+inner+'</svg>';
}

let colorState = { color:'#E53935', size:16, tool:'brush', undoStack:[], redoStack:[], drawing:false, lastX:0, lastY:0, ctx:null, canvas:null };

function openColoringCanvas(m, template){
  state.screen='coloring';
  $('#screenTitle').textContent = template.name;
  $('#screenSub').textContent = 'Color Fun';

        + '</div>';

        + '<canvas id="paintCanvas"></canvas>'

        + '</div>';
  html += '<div class="toolbar">';
  html += '<div class="tool-row swatch-row" id="swatchRow">';
  COLOR_SWATCHES.forEach((c,i)=>{
    html += '<button class="swatch-btn'+(i===0?' selected':'')+'" data-color="'+c+'" style="background:'+c+(c==='#FFFFFF'?';border-color:#ccc':'')+'"></button>';
  });
  html += '</div>';
  html += '<div class="tool-row brush-row">'
        + '<span>🖌️ Brush</span>'
        + '<button class="tool-btn" id="brushMinus">−</button>'
        + '<span class="brush-size-label" id="brushSizeLabel">16px</span>'
        + '<button class="tool-btn" id="brushPlus">+</button>'
        + '<button class="tool-btn" id="eraserBtn">🧽 Eraser</button>'
        + '</div>';
  html += '<div class="tool-row action-row">'
        + '<button class="tool-btn" id="undoBtn">↩️ Undo</button>'
        + '<button class="tool-btn" id="redoBtn">↪️ Redo</button>'
        + '<button class="tool-btn" id="clearBtn">🗑️ Clear</button>'
        + '</div>';
  html += '</div>';

  $('#screen').innerHTML = html;
  $('#backToGallery').addEventListener('click',()=>{playClick(); renderColoringGallery(m);});
  initColoringCanvas();

  document.querySelectorAll('.swatch-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.swatch-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      colorState.color = btn.dataset.color;
      if(colorState.tool==='eraser'){ colorState.tool='brush'; $('#eraserBtn').classList.remove('active'); }
      playClick();
    });
  });
  $('#brushMinus').addEventListener('click',()=>{ colorState.size = Math.max(4, colorState.size-4); updateBrushLabel(); playClick(); });
  $('#brushPlus').addEventListener('click',()=>{ colorState.size = Math.min(48, colorState.size+4); updateBrushLabel(); playClick(); });
  $('#eraserBtn').addEventListener('click',()=>{
    colorState.tool = colorState.tool==='eraser' ? 'brush' : 'eraser';
    $('#eraserBtn').classList.toggle('active', colorState.tool==='eraser');
    playClick();
  });
  $('#undoBtn').addEventListener('click', undoColorAction);
  $('#redoBtn').addEventListener('click', redoColorAction);
  $('#clearBtn').addEventListener('click', ()=>{ clearColoringCanvas(); mascotSay('Fresh start! 🧼'); });
}

function initColoringCanvas(){
  const canvas = $('#paintCanvas');
  canvas.width = 800; canvas.height = 800;
  const ctx = canvas.getContext('2d');
  colorState = { color: COLOR_SWATCHES[0], size:16, tool:'brush', undoStack:[], redoStack:[], drawing:false, lastX:0, lastY:0, ctx:ctx, canvas:canvas };
  updateBrushLabel();
  updateUndoRedoButtons();

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY };
  }
  function setStyle(){
    ctx.globalCompositeOperation = colorState.tool==='eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = colorState.color; ctx.fillStyle = colorState.color;
    ctx.lineWidth = colorState.size*2; ctx.lineCap='round'; ctx.lineJoin='round';
  }
  function dot(x,y){ setStyle(); ctx.beginPath(); ctx.arc(x,y,colorState.size,0,Math.PI*2); ctx.fill(); }
  function line(x1,y1,x2,y2){ setStyle(); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

  canvas.addEventListener('pointerdown', e=>{
    e.preventDefault();
    colorState.drawing = true;
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    pushColorUndo();
    const p = getPos(e); colorState.lastX=p.x; colorState.lastY=p.y;
    dot(p.x,p.y);
  });
  canvas.addEventListener('pointermove', e=>{
    if(!colorState.drawing) return;
    e.preventDefault();
    const p = getPos(e);
    line(colorState.lastX,colorState.lastY,p.x,p.y);
    colorState.lastX=p.x; colorState.lastY=p.y;
  });
  function endStroke(){ colorState.drawing=false; }
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', endStroke);
}

function updateBrushLabel(){
  const el = $('#brushSizeLabel');
  if(el) el.textContent = colorState.size+'px';
}

function pushColorUndo(){
  const dataURL = colorState.canvas.toDataURL();
  colorState.undoStack.push(dataURL);
  if(colorState.undoStack.length>25) colorState.undoStack.shift();
  colorState.redoStack = [];
  updateUndoRedoButtons();
}

function restoreColorCanvas(dataURL){
  const img = new Image();
  img.onload = ()=>{
    const ctx = colorState.ctx;
    ctx.save(); ctx.globalCompositeOperation='source-over';
    ctx.clearRect(0,0,colorState.canvas.width,colorState.canvas.height);
    ctx.drawImage(img,0,0,colorState.canvas.width,colorState.canvas.height);
    ctx.restore();
  };
  img.src = dataURL;
}

function undoColorAction(){
  if(colorState.undoStack.length===0) return;
  colorState.redoStack.push(colorState.canvas.toDataURL());
  restoreColorCanvas(colorState.undoStack.pop());
  updateUndoRedoButtons(); playClick();
}
function redoColorAction(){
  if(colorState.redoStack.length===0) return;
  colorState.undoStack.push(colorState.canvas.toDataURL());
  restoreColorCanvas(colorState.redoStack.pop());
  updateUndoRedoButtons(); playClick();
}
function clearColoringCanvas(){
  pushColorUndo();
  const ctx = colorState.ctx;
  ctx.save(); ctx.globalCompositeOperation='source-over';
  ctx.clearRect(0,0,colorState.canvas.width,colorState.canvas.height);
  ctx.restore();
  playClick();
}
function updateUndoRedoButtons(){
  const u=$('#undoBtn'), r=$('#redoBtn');
  if(u){ u.style.opacity = colorState.undoStack.length ? '1':'.4'; }
  if(r){ r.style.opacity = colorState.redoStack.length ? '1':'.4'; }
}

/* ---------------- MUSICAL INSTRUMENTS ---------------- */
function getMusicCtx(){
  const ctx = window._actx || (window._actx = new (window.AudioContext||window.webkitAudioContext)());
  if(ctx.state==='suspended'){ try{ ctx.resume(); }catch(e){} }
  return ctx;
}

function playInstrumentNote(type, freq, duration){
  const ctx = getMusicCtx();
  const now = ctx.currentTime;

  if(type==='piano'){
    const dur = duration || 0.9;
    const osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
    const osc2 = ctx.createOscillator(); osc2.type='sine'; osc2.frequency.value=freq*2;
    const gain = ctx.createGain(); const gain2 = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.5, now+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    gain2.gain.setValueAtTime(0.0001, now);
    gain2.gain.exponentialRampToValueAtTime(0.12, now+0.01);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now+dur*0.6);
    osc.connect(gain); gain.connect(ctx.destination);
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc.start(now); osc.stop(now+dur+0.05);
    osc2.start(now); osc2.stop(now+dur*0.6+0.05);

  } else if(type==='violin' || type==='flute'){
    const dur = duration || (type==='violin' ? 1.1 : 0.9);
    const osc = ctx.createOscillator();
    osc.type = type==='violin' ? 'sawtooth' : 'sine';
    osc.frequency.value = freq;
    const lfo = ctx.createOscillator(); lfo.frequency.value = type==='violin' ? 5.5 : 4.5;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = type==='violin' ? 3 : 2;
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(type==='violin'?0.32:0.28, now+(type==='violin'?0.15:0.08));
    gain.gain.linearRampToValueAtTime(0.0001, now+dur);
    if(type==='violin'){
      const filter = ctx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=freq*4;
      osc.connect(filter); filter.connect(gain);
    } else {
      osc.connect(gain);
    }
    gain.connect(ctx.destination);
    osc.start(now); lfo.start(now);
    osc.stop(now+dur+0.05); lfo.stop(now+dur+0.05);

  } else if(type==='tabla' || type==='dholak'){
    const dur = type==='dholak' ? 0.4 : 0.24;
    const osc = ctx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(30,freq*0.55), now+dur*0.8);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.7, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now+dur);
    osc.connect(gain); gain.connect(ctx.destination);

    const bufferSize = Math.floor(ctx.sampleRate*0.05);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
    const noise = ctx.createBufferSource(); noise.buffer = buffer;
    const noiseFilter = ctx.createBiquadFilter(); noiseFilter.type='bandpass'; noiseFilter.frequency.value=freq*2.2;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.35, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now+0.06);
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);

    osc.start(now); osc.stop(now+dur+0.05);
    noise.start(now); noise.stop(now+0.07);
  }
}

function bindInstrumentKeys(type, duration){
  document.querySelectorAll('.instrument-key').forEach(function(key){
    const fire = function(e){
      if(e) e.preventDefault();
      const freq = parseFloat(key.dataset.freq);
      playInstrumentNote(type, freq, duration);
      key.classList.add('pressed');
      setTimeout(()=>key.classList.remove('pressed'), 160);
      const disp = $('#nowPlaying');
      if(disp) disp.textContent = '🎵 '+(key.dataset.label||'');
    };
    key.addEventListener('pointerdown', fire);
  });
}

/* Pulls a shared pool of {label,emoji,cat} items from every emoji-based category —
   this is what lets new games automatically cover every category as more get added. */
function getEmojiItemPool(){
  const pool = [];
  MODULES.forEach(function(m){
    if(m.visual==='emoji' && Array.isArray(m.items)){
      m.items.forEach(function(it){
        if(it.emoji && it.label){ pool.push({label:it.label, emoji:it.emoji, cat:m.id}); }
      });
    }
  });
  return pool;
}

function startShapeFit(m, difficulty){
  state.mind = { game:'shapefit', difficulty:difficulty, level:1, total:MIND_LEVEL_COUNTS[difficulty], stars:0 };
  nextShapeFitLevel(m);
}

function generateShapeFitLevel(difficulty){
  let pool, numOptions;
  if(difficulty==='easy'){ pool=EASY_SHAPE_TYPES; numOptions=3; }
  else if(difficulty==='medium'){ pool=ALL_SHAPE_TYPES; numOptions=4; }
  else { pool=ALL_SHAPE_TYPES; numOptions=5; }
  const target = pool[randInt(0,pool.length-1)];
  let options = [target];
  if(difficulty==='tough' && SIMILAR_SHAPE_PAIRS[target]){
    const confusables = SIMILAR_SHAPE_PAIRS[target];
    const c = confusables[randInt(0,confusables.length-1)];
    if(c && options.indexOf(c)===-1) options.push(c);
  }
  let guard=0;
  while(options.length<numOptions && guard<100){
    guard++;
    const candidate = pool[randInt(0,pool.length-1)];
    if(options.indexOf(candidate)===-1) options.push(candidate);
  }
  options = shuffle(options);
  const optionColors = options.map(()=>PALETTE[randInt(0,PALETTE.length-1)]);
  return { target:target, options:options, optionColors:optionColors };
}

function flipMemoryCard(m, idx){
  const g = state.mind.current;
  if(g.flipped.length>=2) return;
  if(g.cards[idx].matched || g.flipped.indexOf(idx)!==-1) return;
  g.flipped.push(idx);
  playClick();
  renderMemoryCardsGrid(m);
  if(g.flipped.length===2){
    const a = g.flipped[0], b = g.flipped[1];
    if(g.cards[a].emoji === g.cards[b].emoji){
      g.cards[a].matched = true; g.cards[b].matched = true;
      g.matchesFound++;
      g.flipped = [];
      playCorrect();
      setTimeout(()=>{
        renderMemoryCardsGrid(m);
